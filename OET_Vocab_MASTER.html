g yet", "defn": "Patient has not identified a specific trigger — signals further investigation or diary keeping is needed", "example": "I have been keeping a food diary for two weeks but I haven't pinpointed anything yet.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "it is a tube passed through your throat with a camera at the end", "defn": "Plain English explanation of an endoscopy — essential OET patient-explanation language", "example": "An endoscopy — it is a tube passed through your throat with a camera at the end — lets us look directly at the stomach lining.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "just pain related to lifting", "defn": "Musculoskeletal pain with a clear mechanical trigger — lifting as causative activity", "example": "He described it as just pain related to lifting — it only comes on when he carries heavy objects.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "we will reassess", "defn": "Clinical closing phrase — signals the decision is not final and the patient will be reviewed", "example": "Start the medication and come back in two weeks — we will reassess at that point and adjust if needed.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "conversion", "defn": "1. Neurological symptoms without organic cause (conversion disorder) 2. Changing a drug from IV to oral", "example": "After all organic causes were excluded the team considered a diagnosis of conversion disorder.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "convulsion", "defn": "Involuntary rhythmic muscle contractions — a seizure episode", "example": "The child experienced a febrile convulsion during a high fever which resolved spontaneously within two minutes.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "halitosis", "defn": "Medical term for persistent bad breath — causes include poor oral hygiene gum disease GORD dry mouth", "example": "The patient presented with persistent halitosis that had not improved despite regular brushing.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "underlying cause", "defn": "The root or primary cause beneath the surface symptom — always treat the underlying cause not just the symptom", "example": "The mouthwash may help short-term but we need to identify and treat the underlying cause.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "oral hygiene", "defn": "Practices that maintain the health of the mouth — brushing flossing mouthwash regular dental check-ups", "example": "Poor oral hygiene is the most common cause of halitosis and can usually be improved with consistent brushing and flossing.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "antibacterial", "defn": "Having properties that kill or inhibit bacterial growth — can be topical (mouthwash cream) or systemic (antibiotic)", "example": "An antibacterial mouthwash containing chlorhexidine may help reduce the bacterial load responsible for halitosis.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "schedule an endoscopy", "defn": "To book or arrange an endoscopic procedure — standard clinical recommendation", "example": "I would like to schedule an endoscopy for you — we need to look at the lining of your stomach directly.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "saline nasal spray", "defn": "Sodium chloride solution used as a nasal rinse — safer long-term alternative to decongestants", "example": "A saline nasal spray can help moisturise the nasal passages without the risk of rebound congestion.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "rebound congestion", "defn": "Worsening of nasal congestion after overusing or stopping a nasal decongestant", "example": "Using a decongestant for more than five days can cause rebound congestion — the nose becomes more blocked than before.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "gastroenterologist", "defn": "A specialist doctor who diagnoses and treats conditions of the digestive system", "example": "He was referred to a gastroenterologist after his GP suspected irritable bowel syndrome.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "irritable bowel syndrome (IBS)", "defn": "A common functional disorder of the digestive system causing bloating unpredictable bowel habits and abdominal pain", "example": "Irritable bowel syndrome is not caused by structural damage — it is a functional condition affecting how the gut moves.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "antacid", "defn": "An over-the-counter medication that neutralises stomach acid — used for heartburn and indigestion", "example": "She had been managing her heartburn with antacids from the pharmacy for several years.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "bloating", "defn": "A feeling of fullness or distension in the abdomen — common in IBS food intolerances and bowel conditions", "example": "The patient's main complaint was bloating after meals which had been worsening over the past year.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "constipation", "defn": "Infrequent or difficult passage of stools — fewer than three bowel motions per week", "example": "He had been suffering from constipation for the past month which was unusual for him.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "migraine", "defn": "A severe recurring headache — often one-sided — with nausea and light sensitivity — British RP: MEE-grayn", "example": "She experienced migraines at the same time as her stomach symptoms — she had not initially connected the two.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "insomnia", "defn": "Persistent difficulty falling or staying asleep — can be onset (can't get to sleep) or maintenance (waking in the night)", "example": "He went to bed exhausted every night but suffered from insomnia — much more than he had ever experienced before.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "nutritionist", "defn": "A professional who advises on diet and nutrition — not the same as a dietitian in all contexts", "example": "A nutritionist had advised him to increase his fluid intake and review his fibre consumption.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "fibre (dietary)", "defn": "Indigestible plant material that supports bowel health — found in vegetables wholegrains and legumes", "example": "The nutritionist suggested his fibre intake might be insufficient though the patient disagreed.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "dairy products", "defn": "Foods made from animal milk — butter cheese yoghurt milk — can worsen IBS in some patients", "example": "He tried cutting out dairy products to see if they were contributing to his symptoms but noticed no improvement.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "antispasmodic", "defn": "A drug that relaxes smooth muscle in the gut — used to relieve cramping in IBS — e.g. mebeverine", "example": "His GP prescribed an antispasmodic to relax the muscular contractions that move food through the gut.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "muscular contractions", "defn": "The rhythmic squeezing movements of the gut wall that move food through the digestive tract", "example": "Antispasmodics work by relaxing the muscular contractions responsible for cramping pain.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "antidepressants", "defn": "Medications that target nerve signals — in IBS context used for their effect on the gut-brain axis not for depression per se", "example": "He had been given antidepressants and was giving them a go — though he was not entirely sure why.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "neurologist", "defn": "A specialist doctor who diagnoses and treats conditions of the nervous system", "example": "She was referred to a neurologist after physiotherapy failed to resolve her symptoms.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "osteopath", "defn": "A healthcare practitioner who treats musculoskeletal problems through manipulation", "example": "She visited an osteopath hoping for relief from her neck stiffness but the treatment made things worse.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "spasmodic torticollis", "defn": "A neurological condition causing involuntary pulling or twisting of the head to one side — also called cervical dystonia", "example": "She was diagnosed with spasmodic torticollis — a condition causing her head to pull involuntarily towards her right shoulder.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "chiropractic treatment", "defn": "Manual therapy focused on the spine and musculoskeletal system — provided by a chiropractor", "example": "She tried chiropractic treatment for six months at great expense but it provided no lasting benefit.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "support group", "defn": "A group of people with a shared condition who meet to provide mutual understanding and information", "example": "Joining a support group for spasmodic torticollis patients gave her a sense of community.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "orthopaedic chair", "defn": "A chair designed to support correct posture and reduce musculoskeletal strain", "example": "She purchased an orthopaedic chair at home to provide postural support and reduce her pain levels.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "Botox injection (therapeutic)", "defn": "Botulinum toxin injected into muscles to treat dystonia spasm or chronic migraine — not cosmetic in this context", "example": "She read about Botox injections being used at a university hospital to treat spasmodic torticollis.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "problems swallowing (dysphagia)", "defn": "Difficulty or discomfort when swallowing — can be a side effect of Botox injections in the neck", "example": "A known side effect of Botox injections in the neck region is temporary problems swallowing.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "up the dosage", "defn": "To increase the dose — informal phrasing — clinical equivalent: uptitrate or increase the dose", "example": "Even after upping the dosage the subsequent injections were not as effective as the first round.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "morphine pump (PCA)", "defn": "A patient-controlled analgesia device allowing self-administration of morphine for pain relief", "example": "For pain management she was eventually given a pump so she could self-administer morphine as needed.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "endometriosis", "defn": "A condition where uterine tissue grows outside the uterus — causing pelvic pain bloating and fatigue", "example": "She had been living with endometriosis for many years before it was formally diagnosed.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "occasional bouts of nausea", "defn": "Intermittent episodes of nausea — not constant but recurring", "example": "She experienced occasional bouts of nausea that came on without warning after meals.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "cervical cancer", "defn": "Cancer of the cervix — the lower part of the uterus", "example": "She was eventually diagnosed with cervical cancer which fortunately had not advanced too far.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "hysterectomy", "defn": "Surgical removal of the uterus — may also include ovaries and fallopian tubes", "example": "She was advised to have a hysterectomy and the procedure went relatively smoothly.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "iron deficiency anaemia", "defn": "Low red blood cell count due to insufficient iron — causes fatigue pallor and breathlessness", "example": "The doctor initially suspected iron deficiency anaemia based on her symptoms of fatigue.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "iron overload", "defn": "Excess iron accumulation in the body — as in haemochromatosis", "example": "The blood test results were unexpected — she had iron overload rather than iron deficiency.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "haemochromatosis", "defn": "A hereditary condition causing the body to absorb too much iron — treated with regular venesection", "example": "Haemochromatosis is a genetic condition — the doctor asked about family history.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "venesection", "defn": "The therapeutic removal of blood to reduce iron stores — primary treatment for haemochromatosis", "example": "She was told that venesection — regular removal of blood — was the only treatment option.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "stiffness in joints", "defn": "Reduced ease of movement in joints — particularly noticeable in the morning or after rest", "example": "She had started to notice stiffness in her joints — particularly in her fingers and knees.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "short of breath", "defn": "Difficulty breathing or breathlessness — even at rest or during mild activity", "example": "She occasionally felt short of breath even during light activities like walking the dog.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "caught COVID-19", "defn": "Became infected with the COVID-19 virus", "example": "It all started when he caught COVID-19 — he had not been vaccinated at the time.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "flu-like symptoms", "defn": "Initial symptoms resembling influenza — fever body aches fatigue and cough", "example": "He initially presented with typical flu-like symptoms that later developed into a persistent dry cough.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "sapped my energy", "defn": "Gradually drained or depleted energy levels over time — more gradual than wipe out", "example": "Looking back the whole experience had really sapped his energy — he just did not feel like himself.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "getting out of breath just doing ordinary things", "defn": "Breathlessness with minimal exertion — a significant functional limitation", "example": "He was getting out of breath just doing ordinary things like carrying groceries up the stairs.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "brain would go kind of fuzzy", "defn": "Informal description of cognitive impairment — brain fog — difficulty thinking clearly", "example": "His brain would go kind of fuzzy and he could not focus on anything properly.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "words would be on the tip of my tongue", "defn": "Word-finding difficulty — almost remembering a word but being unable to retrieve it — a specific cognitive symptom", "example": "Words would be on the tip of my tongue but just would not come out — it was very frustrating.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "palpitations", "defn": "An awareness of the heartbeat — often described as racing pounding or fluttering — always used in plural", "example": "When he started experiencing palpitations and chest pains he went to see his doctor.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "ECG (electrocardiogram)", "defn": "A recording of the electrical activity of the heart — used to detect arrhythmias and cardiac abnormalities", "example": "He underwent several cardiac tests including an ECG and was placed on a heart monitor for five days.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "arrhythmia", "defn": "An abnormal heart rhythm — can be too fast too slow or irregular", "example": "The heart monitor identified arrhythmia as the cause of his palpitations and chest discomfort.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "beta blockers", "defn": "Medications that slow the heart rate and reduce blood pressure — used for arrhythmias angina and hypertension", "example": "He was prescribed beta blockers for the arrhythmia and noticed improvement almost immediately.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "vitamin D levels were low", "defn": "Blood test finding — vitamin D deficiency — common in people with limited sun exposure", "example": "Blood tests also revealed that his vitamin D levels were low and supplements were recommended.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "dull ache", "defn": "A persistent low-level pain — not sharp or stabbing — often described in joints or muscles", "example": "The joint pain was best described as a dull ache rather than a sharp or stabbing sensation.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "numbness in fingers", "defn": "Loss of sensation in the fingers — can indicate nerve compression poor circulation or neuropathy", "example": "He reported a certain amount of numbness in his fingers which he found particularly worrying.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "resistance bands", "defn": "Elastic bands used for strength training — lower intensity than free weights — suitable for rehabilitation", "example": "The physiotherapist suggested starting with resistance bands before progressing to light weights.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "stomach ulcer", "defn": "A sore on the lining of the stomach or duodenum — caused by H. pylori or NSAIDs — presents with burning pain", "example": "He had initially thought it was a stomach ulcer which had been troubling him for some time.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "endoscopy", "defn": "A procedure where a flexible tube with a camera is passed through the mouth to examine the digestive tract", "example": "He had what the doctor called an endoscopy — a tube passed down the throat to look at the insides.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "biopsy", "defn": "The removal of a small tissue sample for laboratory analysis — to rule out malignancy or confirm diagnosis", "example": "As part of the endoscopy a biopsy was taken to make sure it was not something more serious.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "Helicobacter pylori", "defn": "A bacterial infection of the stomach lining — a common cause of peptic ulcers — treated with antibiotics", "example": "The endoscopy confirmed Helicobacter pylori — a course of antibiotics cleared it up completely.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "hernia operation", "defn": "Surgical repair of a hernia — where tissue protrudes through a weak spot in surrounding muscle", "example": "He had a hernia operation shortly after retiring — he suspected it was an occupational injury.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "occupational injury", "defn": "An injury or health condition caused or worsened by work activities or environment", "example": "Several of his colleagues had the same problem — he believed it was an occupational injury.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "running out of energy", "defn": "A gradual depletion of physical energy during activity — fatigue setting in", "example": "He would be digging in the garden and suddenly find himself running out of energy.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "do not fancy something", "defn": "British informal — to not want or have an appetite for something — clinical signal for reduced appetite", "example": "He no longer fancied the sort of big meals he used to enjoy — he would feel sick if he had too much.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "run in families", "defn": "To have a hereditary or genetic tendency within a family — common lay expression for familial predisposition", "example": "He was aware that these conditions can run in families — his uncle had had similar problems.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "trip of a lifetime", "defn": "A highly significant once-in-a-lifetime travel experience — used to explain the urgency of getting medical clearance", "example": "The Antarctica cruise was the trip of a lifetime and he needed to make sure he was well enough to go.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "varicose veins", "defn": "Enlarged twisted veins visible under the skin — most common in the legs — can cause aching swelling and itching", "example": "She had been struggling with varicose veins that had progressively worsened over the past four years.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "blood clot", "defn": "A coagulated mass of blood — in veins: DVT — in lungs: PE — potentially life-threatening", "example": "An ultrasound was performed to check for a blood clot — thankfully that was all clear.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "sclerotherapy (foam)", "defn": "A procedure where a foaming agent is injected into varicose veins to seal them — done under local anaesthetic", "example": "The doctor arranged foam injections into the varicose veins — a relatively new outpatient procedure.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "local anaesthetic", "defn": "An anaesthetic agent that numbs a specific area without causing unconsciousness", "example": "The procedure was performed under local anaesthetic — she did not need to stay overnight.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "compression stockings", "defn": "Graduated pressure stockings worn to improve circulation and reduce swelling — prescribed after vein procedures or DVT", "example": "She was required to wear compression stockings for two weeks following the procedure.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "paediatrician", "defn": "A specialist doctor who treats infants children and adolescents", "example": "The paediatrician referred the child to a specialist clinic for further assessment.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "eczema", "defn": "A chronic inflammatory skin condition causing itching redness and dry scaly patches", "example": "His eczema had flared up significantly over the winter months particularly on his arms.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "aqueous cream", "defn": "A water-based emollient cream used to moisturise dry skin — previously used as a wash for eczema patients", "example": "The GP had initially prescribed aqueous cream but it was causing further skin irritation.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "petroleum jelly", "defn": "A thick ointment used as a barrier cream to protect dry or irritated skin — also called Vaseline", "example": "Petroleum jelly can be applied as a barrier cream to protect the skin around inflamed areas.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "Asperger's syndrome", "defn": "A condition on the autism spectrum characterised by difficulty with social interaction and rigid routines", "example": "She mentioned she had heard about conditions such as Asperger's and wondered if her son might be affected.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "gallstones", "defn": "Solid deposits that form in the gallbladder — can cause upper right abdominal pain especially after fatty meals", "example": "An ultrasound was ordered to rule out gallstones as a possible cause of her upper abdominal pain.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "heartburn", "defn": "A burning sensation in the chest caused by stomach acid rising into the oesophagus — also called acid reflux", "example": "She described a burning sensation in her chest after meals consistent with heartburn.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "bowel habits", "defn": "The pattern and frequency of a person's bowel movements — clinicians always ask about changes", "example": "The GP asked whether she had noticed any changes in her bowel habits over the past few weeks.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "in my calf", "defn": "Pain or swelling located in the lower back of the leg — the calf muscle — clinically relevant for DVT", "example": "She reported a dull aching pain in her calf that had developed after a long-haul flight.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "metformin", "defn": "A first-line oral medication for type 2 diabetes — biguanide class — must be taken with meals to reduce GI side effects", "example": "She had recently been started on metformin and was experiencing nausea when taking it before breakfast.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "nausea", "defn": "An unpleasant sensation of wanting to vomit — common side effect of many medications", "example": "The main side effect she reported was nausea occurring approximately thirty minutes after each dose.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "extended release (modified release)", "defn": "A formulation that releases the drug slowly over time — causes fewer GI side effects than immediate release", "example": "Switching to extended release metformin may reduce the gastrointestinal side effects significantly.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "MUR (Medicines Use Review)", "defn": "A structured review of a patient's medications conducted by a pharmacist to check for problems and improve adherence", "example": "She was invited to attend a medicines use review to discuss her new medications and any concerns.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "hypertension", "defn": "High blood pressure — a major risk factor for cardiovascular disease — often asymptomatic", "example": "She had been diagnosed with hypertension the previous year and was taking amlodipine.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "amlodipine", "defn": "A calcium channel blocker used to treat hypertension and angina — common side effects include ankle swelling and flushing", "example": "She was taking amlodipine ten milligrams once daily for her hypertension.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "atorvastatin", "defn": "A statin medication used to lower cholesterol — can cause muscle aches — must not be taken with grapefruit juice", "example": "Her atorvastatin dose had recently been increased from twenty to forty milligrams.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "ibuprofen", "defn": "A non-steroidal anti-inflammatory drug (NSAID) — reduces pain fever and inflammation — can raise blood pressure and worsen renal function", "example": "She had been taking ibuprofen for her headaches without realising it could affect her blood pressure.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "raise blood pressure", "defn": "To increase systemic blood pressure — NSAIDs can do this especially in patients already on antihypertensives", "example": "Ibuprofen can raise blood pressure which is particularly concerning in patients already being treated for hypertension.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "postural hypotension", "defn": "A drop in blood pressure on standing — causing dizziness or lightheadedness — common cause of morning dizziness", "example": "The dizziness on standing first thing in the morning was consistent with postural hypotension.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "salt intake", "defn": "The amount of sodium chloride consumed through food — reducing salt helps lower blood pressure", "example": "Her GP had advised her to reduce her salt intake as part of managing her hypertension.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "paracetamol", "defn": "A common analgesic and antipyretic — first-line choice for pain in patients on warfarin or with peptic ulcer disease", "example": "The pharmacist recommended switching from ibuprofen to paracetamol to avoid the blood pressure interaction.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "highly strung", "defn": "Easily upset or stressed — tense and anxious by nature — describes a child or person who reacts strongly to change", "example": "His teachers had alluded to the fact that he is highly strung and struggles to cope with changes in routine.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "feel shattered", "defn": "To feel completely exhausted — British informal — stronger than tired", "example": "She said she just feels shattered by mid-afternoon and can barely get through the rest of her shift.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "hard dropping off to sleep", "defn": "Difficulty falling asleep at the start of the night — sleep onset insomnia — distinct from waking in the night", "example": "It is really hard dropping off to sleep some nights even when she is completely exhausted.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "the responsibility got me down", "defn": "The burden of responsibility caused low mood or emotional exhaustion — phrasal verb get down = to make someone feel depressed", "example": "She explained that the responsibility really got her down — managing everything alone had been overwhelming.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "bowel habits", "defn": "The pattern and frequency of a person's bowel movements", "example": "The pharmacist asked whether he had noticed any changes in his bowel habits since starting the new medication.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "first seizure", "defn": "The initial seizure episode — onset of epilepsy or a new neurological condition", "example": "The patient experienced her first seizure approximately one month ago while at work.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "lost the ability to speak", "defn": "Sudden or gradual loss of speech production — may indicate stroke TIA or neurological damage", "example": "She lost the ability to speak and was babbling incoherently — consistent with a dominant hemisphere lesion.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "progressive deterioration of mental status", "defn": "A gradual worsening of cognitive function consciousness or behaviour over time", "example": "The notes describe progressive deterioration of mental status over a three-week period.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "altered mental status", "defn": "Any change from baseline mental functioning — includes confusion agitation or reduced consciousness", "example": "She presented with intermittent altered mental status — lucid at times then acutely confused.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "O2 sats are dropping", "defn": "Oxygen saturation falling — a critical clinical sign requiring immediate action", "example": "Her O2 sats are dropping rapidly — we need to secure the airway.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "blood pressure is plummeting", "defn": "Blood pressure falling rapidly — a sign of haemodynamic instability", "example": "Blood pressure is plummeting — commence vasopressors immediately.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "ventricular fibrillation (V-fib)", "defn": "Chaotic electrical activity in the ventricles — no effective cardiac output — requires defibrillation immediately", "example": "The monitor showed ventricular fibrillation — we charged the defibrillator and delivered a shock.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "sinus rhythm restored", "defn": "Normal cardiac rhythm re-established after arrhythmia or cardiac arrest", "example": "After two shocks sinus rhythm was restored and the patient's blood pressure began to recover.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "respiratory arrest", "defn": "Cessation of breathing — requires immediate airway management and ventilation", "example": "The patient went into respiratory arrest and required emergency intubation.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "she is seizing", "defn": "Active seizure in progress — requires immediate medical response", "example": "She is seizing — give lorazepam 2mg IV and call for senior support.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "she is aspirating", "defn": "Inhaling foreign material (food secretions or vomit) into the airway — risk of aspiration pneumonia", "example": "She is aspirating — suction the airway and position her on her side immediately.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "she is ashen", "defn": "Very pale or grey in colour — a sign of poor perfusion or shock", "example": "The patient looked ashen and diaphoretic — consistent with cardiogenic shock.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "cannot ventilate", "defn": "Unable to provide effective breaths through a bag mask or tube — requires alternative airway", "example": "I cannot ventilate — there is significant oedema blocking the airway — we need a surgical airway.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "too much oedema", "defn": "Excessive fluid accumulation in tissues — swelling that may obscure a lesion or obstruct a procedure", "example": "There is too much oedema to visualise the lesion clearly on imaging.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "myoclonic jerk", "defn": "An involuntary brief muscle twitch — can occur at sleep onset (normal) or indicate neurological disease", "example": "He reported myoclonic jerks at sleep onset — this may be clinically significant.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "acute confusional state", "defn": "Sudden onset of confusion disorientation and cognitive disturbance — also called delirium", "example": "She was brought in by her husband in an acute confusional state — unable to recognise him.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "photophobia", "defn": "Abnormal sensitivity to light — a key sign of meningitis migraine and other neurological conditions", "example": "She had marked photophobia and neck stiffness — bacterial meningitis needed to be excluded urgently.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "clubbing of fingers", "defn": "Enlargement of the fingertips with a curved nail — associated with chronic hypoxia lung disease or cardiac conditions", "example": "Examination revealed significant clubbing of the fingers suggesting long-standing respiratory or cardiac disease.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "intubate stat", "defn": "To pass a breathing tube into the trachea immediately — used in emergency airway management", "example": "Intubate stat — he is not maintaining his own airway.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "defibrillation — Charging Clear", "defn": "The process of delivering an electrical shock to restore normal heart rhythm — Charging = loading the device — Clear = warning others to stand back", "example": "Charging — stand clear — shock delivered — checking rhythm now.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "differential diagnosis", "defn": "A list of possible diagnoses ranked by likelihood — generated from symptoms signs and test results", "example": "The team met to discuss the differential diagnosis before ordering further investigations.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "diagnosis of exclusion", "defn": "A diagnosis reached by systematically ruling out all other possible causes", "example": "The diagnosis was one of exclusion — every other cause had been systematically eliminated.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "cultures are pending", "defn": "Microbiological cultures have been sent but results are not yet available", "example": "CSF cultures are pending — we should have preliminary results within 48 hours.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "commenced on broad-spectrum antibiotics", "defn": "Started on antibiotics that cover a wide range of bacteria — used empirically before culture results are available", "example": "The patient was commenced on broad-spectrum antibiotics pending culture results.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "therapeutic trial", "defn": "A treatment given to test a diagnostic hypothesis — if the patient improves the diagnosis is supported", "example": "A therapeutic trial of high-dose steroids was initiated — improvement would support the working diagnosis.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "treatment discontinued due to adverse reaction", "defn": "The medication was stopped because of a harmful or unexpected side effect", "example": "Treatment was discontinued due to an adverse reaction — the patient developed anaphylaxis within minutes.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "cerebral vasculitis", "defn": "Inflammation of blood vessels in the brain — rare — presents with headache seizures and neurological deficits", "example": "Cerebral vasculitis was confirmed on biopsy and treatment with high-dose steroids was commenced.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "neurocysticercosis", "defn": "A parasitic infection of the brain caused by tapeworm larvae — common in areas where pigs are raised", "example": "Neurocysticercosis was identified on MRI — the patient had recently travelled to an endemic region.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "anaphylactic shock", "defn": "A severe life-threatening allergic reaction — causes airway swelling hypotension and circulatory collapse", "example": "She went into anaphylactic shock within minutes of the first dose — epinephrine was given immediately.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "multiple sclerosis (MS)", "defn": "An autoimmune condition attacking the myelin sheath of nerves — causes relapsing or progressive neurological symptoms", "example": "Oligoclonal bands in the CSF and white matter lesions on MRI are consistent with multiple sclerosis.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "DNR — Do Not Resuscitate", "defn": "A legal clinical document stating that cardiopulmonary resuscitation should not be attempted if the patient arrests", "example": "The DNR was signed by the patient after a detailed discussion with the palliative care team.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "albendazole", "defn": "An antiparasitic drug used to treat tapeworm infections including neurocysticercosis", "example": "Albendazole was prescribed for neurocysticercosis along with steroids to reduce the inflammatory response.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "epinephrine (adrenaline)", "defn": "A catecholamine drug used in anaphylaxis cardiac arrest and severe asthma — causes bronchodilation and vasoconstriction", "example": "Epinephrine 0.5mg was administered intramuscularly for the anaphylactic reaction.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "lorazepam (Ativan)", "defn": "A benzodiazepine used to terminate seizures and reduce anxiety — given IV or IM in emergencies", "example": "Lorazepam was given intravenously to terminate the seizure activity.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "gadolinium", "defn": "A contrast agent injected intravenously for MRI — enhances visibility of lesions and abnormal tissue", "example": "Gadolinium was injected into a vein — it distributes through the brain and acts as contrast material for the MRI.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "practise (verb) / practice (noun)", "defn": "British spelling distinction — practise is always the verb practice is always the noun (US English uses practice for both)", "example": "She needs to practise her injection technique daily before the assessment. His pharmacy practice has grown significantly since 2020.", "batch": "SET 12 (Latest)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "strenuous", "defn": "Requiring great physical effort or exertion — used when assessing activity tolerance and exercise capacity", "example": "He was advised to avoid strenuous activity for six weeks following the surgery.", "batch": "SET 12 (Latest)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "exertion", "defn": "Physical effort or strain — clinically relevant for assessing breathlessness chest pain and cardiac symptoms", "example": "She reported shortness of breath on exertion — even walking up one flight of stairs left her breathless.", "batch": "SET 12 (Latest)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "in detail", "defn": "Thoroughly and with full information — signals a comprehensive rather than superficial explanation", "example": "The pharmacist explained the medication regimen in detail, covering timing, side effects, and what to do if a dose was missed.", "batch": "SET 12 (Latest)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "detailed", "defn": "Containing many specific facts or particulars — thorough and comprehensive", "example": "A detailed medication history was taken before the new prescription was dispensed.", "batch": "SET 12 (Latest)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "similar", "defn": "Resembling something else but not identical — used in clinical contexts to describe comparable symptoms presentations or drugs", "example": "The rash appeared similar to contact dermatitis but the distribution was unusual.", "batch": "SET 16 (Latest)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "neonatal", "defn": "Relating to newborn infants — specifically the first 28 days of life — stress on NEE-oh-NAY-tul", "example": "The neonatal unit provides specialist care for premature or seriously ill newborns.", "batch": "SET 16 (Latest)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "pathogen", "defn": "A microorganism such as a bacterium virus or fungus that causes disease — stress on PATH-uh-jen", "example": "Identifying the specific pathogen is essential before selecting the appropriate antibiotic.", "batch": "SET 16 (Latest)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "profuse", "defn": "Present in large amounts — used clinically for sweating bleeding or vomiting that is far above normal — stress on pruh-FYOOS", "example": "She presented with profuse sweating and chest pain — a cardiac cause was immediately considered.", "batch": "SET 16 (Latest)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "diaphoresis", "defn": "The medical term for profuse sweating especially when caused by illness fever or medication — stress on dy-uh-fuh-REE-sis", "example": "Diaphoresis and pallor on examination were consistent with haemodynamic compromise.", "batch": "SET 16 (Latest)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "aztreonam", "defn": "A monobactam antibiotic used against gram-negative bacteria — useful for patients with penicillin allergy — stress on AZ-tree-oh-nam", "example": "Aztreonam was selected because the patient had a documented severe allergy to penicillin.", "batch": "SET 17 (Latest)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "bluntly", "defn": "In a direct and sometimes harsh manner without softening — used to signal that what follows is frank and unfiltered — stress on BLUNT-lee", "example": "Bluntly, the treatment has not been working and we need to consider a different approach.", "batch": "SET 17 (Latest)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "sequential", "defn": "Following a particular order or sequence — one step logically following the previous — used in clinical protocols and treatment planning", "example": "The rehabilitation programme follows a sequential structure — strength before mobility before function.", "batch": "SET 18 (Latest)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "ambient", "defn": "Relating to the surrounding environment or conditions — especially temperature sound or light — used in clinical settings for environmental monitoring", "example": "The ambient temperature of the medication storage area must be kept between 15 and 25 degrees Celsius.", "batch": "SET 18 (Latest)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "allergen", "defn": "A substance that triggers an allergic reaction — distinct from allergy (the reaction itself) — allergen is the trigger substance — stress on AL-uh-jen", "example": "Dust mites pollen mold and pet dander are the most common allergens associated with asthma.", "batch": "SET 19 (Latest) — Richard / Bay Sessions", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "dust mites", "defn": "Microscopic insects living in household dust — one of the most common asthma allergens — stress on DUST MYTS", "example": "House dust mites are found in bedding carpets and soft furnishings — regular washing in hot water helps reduce exposure.", "batch": "SET 19 (Latest) — Richard / Bay Sessions", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "pollen", "defn": "Fine powder released by plants — a common seasonal allergen triggering asthma and hay fever — stress on POL-un", "example": "Her asthma tends to worsen in spring when the pollen count is high.", "batch": "SET 19 (Latest) — Richard / Bay Sessions", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "mold (mould)", "defn": "A type of fungus growing in damp conditions — a common indoor allergen for asthma — British spelling is mould American is mold", "example": "Mold in bathrooms and basements can significantly worsen asthma symptoms in susceptible patients.", "batch": "SET 19 (Latest) — Richard / Bay Sessions", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "wheezing", "defn": "A high-pitched whistling breathing sound caused by narrowed airways — a hallmark symptom of asthma — stress on WHEEZ-ing", "example": "She presented with audible wheezing on expiration and significant chest tightness — her peak flow was reduced.", "batch": "SET 19 (Latest) — Richard / Bay Sessions", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "salbutamol", "defn": "A short-acting beta-2 agonist bronchodilator — the most common reliever inhaler — brand name Ventolin — stress on sal-BYOO-tuh-mol", "example": "Salbutamol should be used for immediate relief of acute asthma symptoms — not as a regular daily treatment.", "batch": "SET 19 (Latest) — Richard / Bay Sessions", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "preventer inhaler", "defn": "An inhaled corticosteroid used daily to reduce airway inflammation and prevent asthma symptoms — distinct from reliever inhaler", "example": "She was reminded to use her preventer inhaler every morning regardless of whether she had symptoms.", "batch": "SET 19 (Latest) — Richard / Bay Sessions", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "reliever inhaler", "defn": "A bronchodilator inhaler used when asthma symptoms occur for immediate relief — salbutamol is the most common example", "example": "She carries her reliever inhaler at all times in case of an acute asthma episode.", "batch": "SET 19 (Latest) — Richard / Bay Sessions", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "inhaled corticosteroids (ICS)", "defn": "Steroid medications delivered directly to the airways by inhaler — the mainstay of asthma preventer therapy — examples include fluticasone and budesonide", "example": "Inhaled corticosteroids are the most effective preventer treatment for persistent asthma and should be taken daily.", "batch": "SET 19 (Latest) — Richard / Bay Sessions", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "muscle tightening", "defn": "The contraction of smooth muscle surrounding the airways in asthma — causes the airway to narrow and makes breathing difficult", "example": "Asthma causes muscle tightening around the airways which reduces the diameter through which air can pass.", "batch": "SET 19 (Latest) — Richard / Bay Sessions", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "non-pharmaceutical management", "defn": "Treatment approaches that do not involve medication — for asthma includes trigger avoidance environmental control and breathing exercises", "example": "Non-pharmaceutical management of asthma is an important complement to medication — identifying and avoiding triggers can significantly reduce the frequency of attacks.", "batch": "SET 19 (Latest) — Richard / Bay Sessions", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "medical hedging", "defn": "The use of qualifying language such as may include can cause or is often associated with to express clinical uncertainty appropriately — essential in OET writing and speaking", "example": "Medical hedging such as may include and is often triggered by is essential when describing symptoms — it reflects clinical accuracy and avoids overstating certainty.", "batch": "SET 19 (Latest) — Richard / Bay Sessions", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "nasal decongestant", "defn": "A medication that reduces nasal congestion by constricting blood vessels in the nasal mucosa — should not be used for more than 3 to 5 days due to rebound risk", "example": "Nasal decongestants are effective short-term but prolonged use beyond five days leads to rebound congestion.", "batch": "SET 19 (Latest) — Richard / Bay Sessions", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "rebound congestion (rhinitis medicamentosa)", "defn": "Worsening nasal congestion that occurs after stopping or overusing a nasal decongestant — caused by receptor desensitisation", "example": "She had been using the decongestant for three weeks — the pharmacist explained that her ongoing congestion was likely rebound congestion.", "batch": "SET 19 (Latest) — Richard / Bay Sessions", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "prolonged use", "defn": "Use of a medication for longer than the recommended duration — often associated with increased risk of side effects or tolerance", "example": "Prolonged use of nasal decongestants is not recommended — the maximum safe duration is three to five days.", "batch": "SET 19 (Latest) — Richard / Bay Sessions", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "saline nasal spray", "defn": "A sodium chloride solution used as a nasal rinse — no active drug ingredient — safe for long-term daily use — alternative to decongestants", "example": "The pharmacist recommended switching to a saline nasal spray which can be used as often as needed without any risk of rebound effects.", "batch": "SET 19 (Latest) — Richard / Bay Sessions", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "nasal passage / nasal mucosa", "defn": "The internal cavity of the nose lined with mucous membrane — the surface affected by decongestants and saline spray", "example": "Prolonged decongestant use can cause irritation to the mucous lining of the nasal passage.", "batch": "SET 19 (Latest) — Richard / Bay Sessions", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "safety netting", "defn": "The clinical communication strategy of telling a patient what to do if symptoms continue worsen or change — always included in OET closing", "example": "Safety netting is the final step — always tell the patient to come back if the problem persists or if they have any concerns.", "batch": "SET 19 (Latest) — Richard / Bay Sessions", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "occupational health nurse", "defn": "A registered nurse who advises employers on workplace health and wellbeing — the role described in the Maria Chen reading passage", "example": "Maria Chen worked as an occupational health nurse advising companies on how to support staff mental health and prevent burnout.", "batch": "SET 19 (Latest) — Richard / Bay Sessions", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "stigma (mental health)", "defn": "The negative attitudes and social shame attached to mental health conditions that prevent people from seeking help", "example": "The stigma surrounding mental health in the workplace is slowly fading as employers increasingly offer counselling and support.", "batch": "SET 19 (Latest) — Richard / Bay Sessions", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "scope of practice", "defn": "The defined range of procedures and actions that a healthcare professional is legally and professionally authorised to perform", "example": "If the patient's symptoms are outside our scope of practice we would refer them to the appropriate healthcare professional.", "batch": "SET 19 (Latest) — Richard / Bay Sessions", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "allergen", "defn": "A substance that triggers an allergic reaction — distinct from allergy (the condition itself) — stress on AL-ur-jen", "example": "Common allergens include dust mites, pollen, mold, and pet dander — all of which can trigger asthma.", "batch": "SET 19 (Latest — from Richard/Bay/Greg sessions)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "wheezing", "defn": "A high-pitched whistling sound when breathing — caused by narrowed airways — a key asthma symptom — stress on WEEZ-ing", "example": "The patient presented with wheezing and chest tightness that had started during moderate exercise.", "batch": "SET 19 (Latest — from Richard/Bay/Greg sessions)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "salbutamol", "defn": "A short-acting bronchodilator (SABA) — used for acute asthma relief — brand name Ventolin — stress on sal-BYOO-tuh-mol", "example": "Salbutamol is the reliever inhaler used for acute symptoms — it should not replace the daily preventer.", "batch": "SET 19 (Latest — from Richard/Bay/Greg sessions)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "preventer inhaler / controller inhaler", "defn": "Daily inhaled corticosteroid used to prevent airway inflammation — distinct from reliever inhalers used for acute symptoms", "example": "She had been taking her preventer inhaler daily for six months and had not needed her salbutamol once.", "batch": "SET 19 (Latest — from Richard/Bay/Greg sessions)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "COPD — Chronic Obstructive Pulmonary Disease", "defn": "A chronic progressive lung condition — always introduce abbreviation with full form on first use — OET best practice", "example": "Patients with COPD, which is a chronic obstructive pulmonary disease, often require both pharmacological and non-pharmacological management.", "batch": "SET 19 (Latest — from Richard/Bay/Greg sessions)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "second-hand smoke", "defn": "Smoke inhaled by non-smokers from a nearby smoker — also called passive smoking — an important counselling topic", "example": "Second-hand smoke affects family members who live with smokers — children are particularly vulnerable to its effects.", "batch": "SET 19 (Latest — from Richard/Bay/Greg sessions)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "nicotine dependence / nicotine addiction", "defn": "Both acceptable in OET — dependence is slightly more clinical — key point: cessation is very difficult without structured support", "example": "Nicotine dependence makes cessation very difficult — pharmacological support such as nicotine replacement therapy is strongly recommended.", "batch": "SET 19 (Latest — from Richard/Bay/Greg sessions)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "cessation", "defn": "The act of stopping a behaviour — clinical term for quitting smoking — more formal than quitting", "example": "Cessation is strongly recommended for all smokers — a range of pharmacological and behavioural support options are available through community pharmacy.", "batch": "SET 19 (Latest — from Richard/Bay/Greg sessions)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "cardiovascular disease", "defn": "Disease affecting the heart and blood vessels — smoking raises blood pressure and leads to cardiovascular disease and stroke", "example": "Smoking increases blood pressure which over time leads to cardiovascular disease and significantly raises the risk of stroke.", "batch": "SET 19 (Latest — from Richard/Bay/Greg sessions)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "impair (cognitive function)", "defn": "To weaken or damage a specific function — impair + noun — impair cognitive function is a high-register clinical phrase", "example": "Second-hand smoke can impair cognitive function in children — particularly affecting attention and language development.", "batch": "SET 19 (Latest — from Richard/Bay/Greg sessions)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "detrimental", "defn": "Causing harm or damage — a high-register clinical adjective that lifts writing from B2 to C1 — stress on det-ri-MEN-tul", "example": "Smoking has detrimental effects on both the respiratory and cardiovascular systems.", "batch": "SET 19 (Latest — from Richard/Bay/Greg sessions)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "decongestant (prolonged use)", "defn": "A medication used to relieve nasal congestion — recommended for 3 to 5 days only — prolonged use causes rebound congestion", "example": "Prolonged use of nasal decongestants beyond five days can cause the receptors to become desensitised and the spray loses effectiveness.", "batch": "SET 19 (Latest — from Richard/Bay/Greg sessions)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "saline spray", "defn": "A salt water solution used as a nasal rinse — no medication involved — can be used as often as needed — no rebound risk", "example": "The advantage of saline spray is that it helps the nasal passage to recover naturally and can be used long term without any side effects.", "batch": "SET 19 (Latest — from Richard/Bay/Greg sessions)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "nasal mucus / nasal passage", "defn": "The lining and internal channel of the nose — mucus = the fluid produced — both terms used in decongestant counselling", "example": "Saline spray helps the nasal mucus to recover and keeps the nasal passage moist and clear.", "batch": "SET 19 (Latest — from Richard/Bay/Greg sessions)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "rebound congestion", "defn": "Worsening of nasal congestion after stopping or overusing a nasal decongestant — also called rhinitis medicamentosa", "example": "Prolonged use of decongestants leads to rebound congestion — the nose becomes more blocked than before once the spray is stopped.", "batch": "SET 19 (Latest — from Richard/Bay/Greg sessions)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "if the problem persists please come back", "defn": "OET essential closing phrase — always include a safety net and referral option in closing — problem persists must be memorised", "example": "If the problem persists after two weeks of using the saline spray please come back — we can discuss other options or refer you to your doctor.", "batch": "SET 19 (Latest — from Richard/Bay/Greg sessions)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "causative structure — cause / lead to / result in", "defn": "Things cause effects using a noun structure — not to + verb. Pattern: [cause] + cause/lead to/result in + [noun effect]. Smoking damages ✅ / smoking causes to damage ❌", "example": "High fever can cause significant fluid loss — prolonged fever may lead to dehydration and in severe cases can result in seizures.", "batch": "SET 19 (Latest — from Richard/Bay/Greg sessions)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "stative verbs — consist of / contain / include", "defn": "These verbs describe a state not an action — never use is before them. Body consists of water ✅ / body is consist of water ❌", "example": "Our body consists of approximately 60 to 70 percent water — which is why adequate daily fluid intake is essential.", "batch": "SET 19 (Latest — from Richard/Bay/Greg sessions)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "transitive verbs — acknowledge / confirm / accept", "defn": "These verbs take a direct object with no preposition — acknowledge this ✅ / acknowledge about this ❌. Same rule: confirm / accept / consider / understand", "example": "Parents must acknowledge the early signs of fever and respond promptly rather than waiting.", "batch": "SET 19 (Latest — from Richard/Bay/Greg sessions)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "embedded question — statement word order", "defn": "When a question is inside a statement the word order flips to subject + verb — what the fever is ✅ / what is the fever ❌", "example": "First we need to define what the fever is — then we can explain how the body responds.", "batch": "SET 19 (Latest — from Richard/Bay/Greg sessions)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "wheezing", "defn": "A high-pitched whistling sound made during breathing when airways are narrowed — a key symptom of asthma that Derek omitted from his 3-2-1 speech — stress on WEEZ-ing", "example": "The patient presented with wheezing on exertion and a persistent nocturnal cough consistent with poorly controlled asthma.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "allergen", "defn": "A substance that triggers an allergic reaction — distinct from allergy which is the reaction itself — stress on AL-ur-jen", "example": "Common allergens in asthma include dust mites, pollen, mould, and pet dander.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "dust mites", "defn": "Microscopic insects living in household dust — one of the most common triggers of asthma and allergic rhinitis", "example": "She was advised to use allergen-proof mattress covers to reduce exposure to dust mites.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "preventer inhaler", "defn": "An inhaler containing inhaled corticosteroids used daily to reduce airway inflammation and prevent asthma attacks — distinct from reliever inhaler", "example": "The pharmacist reminded her that the preventer inhaler must be used every day even when she feels well.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "reliever inhaler", "defn": "A short-acting bronchodilator such as salbutamol used to relieve acute asthma symptoms — also called rescue inhaler", "example": "He was instructed to carry his reliever inhaler at all times and use it at the first sign of breathing difficulty.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "salbutamol", "defn": "A short-acting beta-2 agonist bronchodilator used as a reliever for acute asthma — brand name Ventolin — stress on sal-BYOO-tuh-mol", "example": "Salbutamol provides rapid relief by relaxing the muscles around the airways within minutes of inhalation.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "inhaled corticosteroids (ICS)", "defn": "Steroid medications delivered by inhaler used to reduce airway inflammation as daily preventer therapy in asthma", "example": "Inhaled corticosteroids are the most effective preventer medication for persistent asthma in both adults and children.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "trigger (asthma)", "defn": "A substance or condition that provokes an asthma attack — Richard specifically noted this word appears constantly in OET", "example": "Identifying and avoiding personal asthma triggers is a key part of long-term asthma management.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "inflammation", "defn": "The body's immune response causing redness swelling heat and pain — a core mechanism in asthma and many OET conditions — Richard specifically flagged this word", "example": "Persistent airway inflammation in asthma leads to progressive narrowing and hyperresponsiveness of the airways.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "medical hedging", "defn": "Language that appropriately qualifies clinical statements to avoid overpromising — e.g. may include / can cause / is often associated with — essential in OET writing and speaking", "example": "The key symptoms may include chest tightness, wheezing, and cough — Richard praised this use of medical hedging as OET-level.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "acute", "defn": "Sudden in onset and usually short in duration — contrasted with chronic — stress on uh-KYOOT", "example": "Salbutamol is used for acute symptom relief while the preventer inhaler controls the chronic underlying inflammation.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "non-pharmaceutical", "defn": "Relating to treatment approaches that do not involve medication — including trigger avoidance environmental control and lifestyle modification", "example": "Non-pharmaceutical management of asthma includes avoiding known triggers and maintaining a clean low-allergen environment.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "occupational health", "defn": "The branch of healthcare concerned with the physical and mental wellbeing of workers — seen in Greg Lesson 14 Maria Chen text", "example": "Maria Chen was an occupational health nurse who advised companies on staff wellbeing and mental health programmes.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "stigma", "defn": "A mark of disgrace or disapproval attached to a condition or behaviour — particularly relevant in mental health contexts", "example": "The stigma around mental health in the workplace is slowly fading as employers begin to offer counselling and support.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "burnout", "defn": "A state of chronic physical and emotional exhaustion caused by prolonged workplace stress — distinct from tiredness — stress on BURN-owt", "example": "Many community pharmacists report burnout within the first five years due to high dispensing volumes and understaffing.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "scope of practice", "defn": "The range of clinical activities a healthcare professional is qualified and legally permitted to perform", "example": "Should the symptoms be above our scope of practice we would refer the patient to the relevant healthcare professional.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "refer a patient", "defn": "To send a patient to another healthcare professional for specialist assessment or treatment — a core OET clinical action", "example": "If the symptoms persist or are beyond the pharmacist's scope, the patient should be referred to their GP.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "therapeutic", "defn": "Relating to the treatment or cure of a disease or disorder — stress on ther-uh-PYOO-tik", "example": "The programme was designed to focus on treatment in a therapeutic way rather than simply managing symptoms.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "dehydration", "defn": "A dangerous condition resulting from insufficient fluid intake or excessive fluid loss — common cause: fever vomiting diarrhoea or sweating", "example": "Prolonged fever may result in dehydration due to excessive fluid loss through sweating.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "fluid intake", "defn": "The total amount of liquid consumed — always a noun phrase — intake is a NOUN not a verb", "example": "Patients should be advised to maintain adequate fluid intake particularly during illness when losses are increased.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "hydration", "defn": "The process of maintaining adequate fluid levels in the body — clinical equivalent of drinking enough water", "example": "Adequate hydration is essential for normal digestive function and temperature regulation.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "regulate", "defn": "To control or maintain something at a stable level — used for temperature blood pressure and organ function", "example": "Water plays a critical role in helping the body regulate its internal temperature.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "monitor", "defn": "To observe and check something regularly over time — a core clinical instruction verb", "example": "We should monitor body temperature at regular intervals to detect any changes early.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "vigilant", "defn": "Watchfully alert and attentive — used when advising carers or parents to watch for warning signs", "example": "Parents and carers should be advised to remain vigilant for signs of fever or deterioration in young children.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "carer", "defn": "A person who provides care for someone who is sick elderly or dependent — an OET key word for written tasks", "example": "Parents and carers should be advised to remain vigilant for early signs of fever in children.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "imm
