<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OET Vocab Master — Derek</title>
<style>
  :root {
    --bg:#f0f2f5; --card:#fff; --text:#222; --muted:#666;
    --accent:#2E4F8A; --accent2:#1F3864; --border:#e0e4ef;
    --shadow:rgba(0,0,0,0.08); --row-even:#F5F7FA; --row-odd:#fff;
    --tag-bg:#eef2ff; --highlight:#fff3cd;
    --input-bg:#fff; --input-border:#ccc;
  }
  body.dark {
    --bg:#1a1d23; --card:#23272f; --text:#e0e4ef; --muted:#9aa3b8;
    --accent:#5b9cf6; --accent2:#12151c; --border:#3a3f4b;
    --shadow:rgba(0,0,0,0.3); --row-even:#1e2229; --row-odd:#23272f;
    --tag-bg:#1a2240; --highlight:#4a3d00;
    --input-bg:#23272f; --input-border:#3a3f4b;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:Arial,sans-serif; background:var(--bg); color:var(--text); transition:background 0.3s,color 0.3s; }

  header {
    background:var(--accent2); color:#fff; padding:24px 32px;
    display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px;
  }
  header h1 { font-size:22px; font-weight:700; }
  header p { font-size:13px; color:#aec6ef; margin-top:3px; }
  .toggle-btn {
    background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.3);
    color:#fff; padding:7px 14px; border-radius:20px; cursor:pointer; font-size:12px;
  }
  .toggle-btn:hover { background:rgba(255,255,255,0.25); }

  .controls {
    position:sticky; top:0; background:var(--bg); z-index:100;
    padding:14px 24px; display:flex; flex-wrap:wrap; gap:10px;
    border-bottom:1px solid var(--border); box-shadow:0 2px 6px var(--shadow);
  }
  .controls input {
    flex:1; min-width:200px; padding:9px 14px; border:1px solid var(--input-border);
    border-radius:8px; font-size:14px; background:var(--input-bg); color:var(--text); outline:none;
  }
  .controls input:focus { border-color:var(--accent); }
  .controls select {
    padding:9px 12px; border:1px solid var(--input-border);
    border-radius:8px; font-size:13px; background:var(--input-bg); color:var(--text); outline:none;
  }
  .stat { font-size:12px; color:var(--muted); display:flex; align-items:center; }

  .main { padding:20px 24px 80px; max-width:1200px; margin:0 auto; }

  .category-block { margin-bottom:32px; }
  .category-title {
    font-size:13px; font-weight:700; text-transform:uppercase;
    letter-spacing:1px; color:var(--accent); padding:8px 0 6px;
    border-bottom:2px solid var(--accent); margin-bottom:12px;
  }

  table { width:100%; border-collapse:collapse; font-size:13px; }
  thead tr { background:var(--accent); color:#fff; }
  thead th { padding:9px 12px; text-align:left; font-weight:600; }
  tbody tr:nth-child(even) { background:var(--row-even); }
  tbody tr:nth-child(odd) { background:var(--row-odd); }
  tbody tr:hover { background:var(--tag-bg); }
  tbody td { padding:9px 12px; border-bottom:1px solid var(--border); vertical-align:top; line-height:1.5; }
  .expr { font-weight:700; color:var(--accent); min-width:160px; }
  .example { color:var(--muted); font-style:italic; font-size:12px; }
  .highlight { background:var(--highlight); border-radius:2px; padding:0 2px; }

  .back-btn {
    position:fixed; bottom:20px; right:24px;
    background:var(--accent); color:#fff; border:none; border-radius:24px;
    padding:10px 20px; font-size:13px; cursor:pointer; box-shadow:0 2px 8px var(--shadow);
    text-decoration:none;
  }
  .back-btn:hover { background:#5b9cf6; }

  .empty { text-align:center; padding:60px; color:var(--muted); font-size:16px; }

  @media(max-width:600px) {
    .controls { padding:10px 14px; }
    .main { padding:14px 14px 80px; }
    thead { display:none; }
    tbody tr { display:block; border:1px solid var(--border); border-radius:8px; margin-bottom:10px; padding:10px; }
    tbody td { display:block; border:none; padding:3px 0; }
    tbody td::before { font-weight:700; color:var(--accent); display:block; font-size:11px; text-transform:uppercase; }
    td:nth-child(1)::before { content:"Expression"; }
    td:nth-child(2)::before { content:"Definition"; }
    td:nth-child(3)::before { content:"Example"; }
  }
</style>
</head>

<script>
const DATA = [{"expr": "Excruciating", "defn": "Extremely intense pain — the most severe level (8–10 on VAS) — equivalent to kidney stone pain", "example": "The patient described the pain as excruciating — he rated it 9 out of 10 and was unable to walk.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "PAIN DESCRIPTION & SEVERITY"}, {"expr": "Visual Analogue Scale (VAS)", "defn": "A 0–10 numeric scale used to measure a patient's reported pain intensity", "example": "The pharmacist used the Visual Analogue Scale to assess his pain before recommending analgesia.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "PAIN DESCRIPTION & SEVERITY"}, {"expr": "Unbearable pain", "defn": "Pain so severe the patient cannot tolerate it — typically 8–10 on VAS", "example": "She described the pain as unbearable — she had not slept for two nights and could not function.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "PAIN DESCRIPTION & SEVERITY"}, {"expr": "Severe pain", "defn": "Significant pain that interferes with daily activities — typically 7–10 on VAS", "example": "He presented with severe pain in his right big toe that had started overnight.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "PAIN DESCRIPTION & SEVERITY"}, {"expr": "Throbbing", "defn": "A pulsating or rhythmic pain — often associated with inflammation infection or vascular conditions", "example": "The gout flare caused a throbbing pain in the joint that was worse at night.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "PAIN DESCRIPTION & SEVERITY"}, {"expr": "Splitting headache", "defn": "An extremely intense headache — as if the head is being split apart — severe variant", "example": "He described a splitting headache that had come on suddenly during exertion.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "PAIN DESCRIPTION & SEVERITY"}, {"expr": "Achy muscles / muscle ache", "defn": "A diffuse low-level muscular pain — common with viral illness or overexertion", "example": "She reported achy muscles across her whole body — consistent with a viral illness.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "PAIN DESCRIPTION & SEVERITY"}, {"expr": "Brutal (informal)", "defn": "Extremely exhausting or severe — emotionally loaded term — used by patients to describe debilitating conditions", "example": "The fatigue from her condition was brutal — she described it as completely draining her will to function.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "PAIN DESCRIPTION & SEVERITY"}, {"expr": "Gout", "defn": "A type of inflammatory arthritis caused by uric acid crystal deposition — typically affects the big toe — excruciating pain", "example": "He was diagnosed with gout after presenting with acute excruciating pain in his right big toe.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "GOUT & JOINT CONDITIONS"}, {"expr": "Big toe", "defn": "The hallux — most common site of gout — ask specifically about this joint in relevant presentations", "example": "The pain was localised to his big toe and had developed overnight — highly suggestive of gout.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "GOUT & JOINT CONDITIONS"}, {"expr": "Colchicine / diarrhoea", "defn": "Colchicine is a gout treatment — the most common side effect is diarrhoea — dose-limiting in many patients", "example": "He was started on colchicine for the acute gout flare but developed significant diarrhoea after the second dose.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "GOUT & JOINT CONDITIONS"}, {"expr": "Allopurinol skin rash", "defn": "Allopurinol (urate-lowering therapy) can cause a serious skin rash — Stevens-Johnson syndrome in rare cases", "example": "The patient developed a skin rash three weeks after starting allopurinol — the medication was immediately withheld.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "GOUT & JOINT CONDITIONS"}, {"expr": "Apart from medications", "defn": "A standard clinical question opener — asking about non-pharmacological treatment attempts", "example": "Apart from medications, did you try any other sort of treatment — heat therapy, rest, elevation?", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "GOUT & JOINT CONDITIONS"}, {"expr": "Away with the fairies", "defn": "British informal — mentally absent or confused due to medication or illness", "example": "The sedative made him feel completely away with the fairies — he could not hold a conversation.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "GENERAL UNWELLNESS — PATIENT LANGUAGE"}, {"expr": "Confused / disconnected / lightheaded", "defn": "General terms for impaired mental clarity — often used together to describe drug-induced cognitive effects", "example": "She felt confused and disconnected after starting the new medication — she described it as being lightheaded all day.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "GENERAL UNWELLNESS — PATIENT LANGUAGE"}, {"expr": "To feel sick", "defn": "British informal for nausea — does not always mean vomiting", "example": "She called the pharmacy to say she was feeling very sick after taking the first dose.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "GENERAL UNWELLNESS — PATIENT LANGUAGE"}, {"expr": "The pain didn't get any better — in fact quite the opposite", "defn": "Patient expression for worsening symptoms despite treatment — signals treatment failure", "example": "He reported that the pain had not got any better — in fact quite the opposite — it had doubled overnight.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "GENERAL UNWELLNESS — PATIENT LANGUAGE"}, {"expr": "I was in too much pain to drive", "defn": "Functional limitation statement — signals severity of pain and impact on daily activity", "example": "He had been unable to attend his follow-up appointment — he was in too much pain to drive.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "GENERAL UNWELLNESS — PATIENT LANGUAGE"}, {"expr": "What have you been taking to deal with the pain?", "defn": "Standard pain management history question — open phrasing invites full self-medication disclosure", "example": "What have you been taking to deal with the pain? Include any tablets patches or herbal products.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "GENERAL UNWELLNESS — PATIENT LANGUAGE"}, {"expr": "I can't say they made much difference", "defn": "Patient expression for treatment ineffectiveness — mild understatement", "example": "She had tried three different OTC pain relievers but could not say they had made much difference.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "GENERAL UNWELLNESS — PATIENT LANGUAGE"}, {"expr": "Brutal (adjective)", "defn": "Exhausting and overwhelming — used by patients to describe particularly debilitating experiences", "example": "The weeks of sleeplessness had been brutal — she felt she could not carry on without more support.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "GENERAL UNWELLNESS — PATIENT LANGUAGE"}, {"expr": "I just felt lousy", "defn": "Informal expression for feeling generally unwell — malaise fatigue and discomfort combined", "example": "He said he just felt lousy — no single dominant symptom but a general sense of being run down.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "GENERAL UNWELLNESS — PATIENT LANGUAGE"}, {"expr": "I feel under the weather", "defn": "Informal expression for mild general unwellness — typically cold flu or fatigue", "example": "She phoned in saying she had felt under the weather all week and was not sure if she should take her usual medication.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "GENERAL UNWELLNESS — PATIENT LANGUAGE"}, {"expr": "I feel run down", "defn": "Feeling depleted and weakened — often from chronic illness poor sleep or inadequate nutrition", "example": "She had been feeling run down for weeks — fatigue poor appetite and difficulty concentrating.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "GENERAL UNWELLNESS — PATIENT LANGUAGE"}, {"expr": "Sweating buckets", "defn": "Informal expression for profuse sweating — can indicate fever infection or medication reaction", "example": "He described sweating buckets throughout the night — drenching his sheets repeatedly.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "GENERAL UNWELLNESS — PATIENT LANGUAGE"}, {"expr": "Splitting headache", "defn": "Extremely severe headache — often sudden onset", "example": "She woke with a splitting headache that she rated 10 out of 10 — the worst of her life.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "GENERAL UNWELLNESS — PATIENT LANGUAGE"}, {"expr": "I can't keep anything down", "defn": "Unable to tolerate oral intake due to nausea or vomiting", "example": "She called the pharmacy to report she could not keep anything down — every dose was immediately vomited.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "GENERAL UNWELLNESS — PATIENT LANGUAGE"}, {"expr": "I was throwing up all day yesterday", "defn": "Patient description of persistent vomiting — clinically signals dehydration risk and inability to take oral medications", "example": "He reported throwing up all day yesterday — oral medication was not viable and IV access was considered.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "GENERAL UNWELLNESS — PATIENT LANGUAGE"}, {"expr": "Meningitis", "defn": "Inflammation of the meninges surrounding the brain — medical emergency — presents with headache neck stiffness photophobia and fever", "example": "The patient presented with a severe headache photophobia and neck stiffness — bacterial meningitis was suspected.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "INFECTIOUS DISEASE"}, {"expr": "Artesunate", "defn": "An antimalarial drug — first-line treatment for severe malaria", "example": "Artesunate was commenced intravenously as the patient had severe falciparum malaria.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "INFECTIOUS DISEASE"}, {"expr": "Mefloquine (Lariam)", "defn": "An antimalarial drug associated with serious psychiatric side effects including odd dreams and psychosis", "example": "He had been prescribed mefloquine for malaria prophylaxis and was warned about the risk of odd dreams and psychotic symptoms.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "INFECTIOUS DISEASE"}, {"expr": "Some sorts of malaria resistant to these drugs", "defn": "Patient phrasing for antimalarial drug resistance — clinically important — affects drug selection", "example": "He was worried because he had heard that some sorts of malaria are resistant to the usual drugs in the region he was visiting.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "INFECTIOUS DISEASE"}, {"expr": "Psychotic symptoms", "defn": "Symptoms including delusions hallucinations and disorganised thinking — a serious side effect of mefloquine", "example": "She developed psychotic symptoms during her course of mefloquine — the drug was immediately discontinued.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "INFECTIOUS DISEASE"}, {"expr": "Septicemia (septicaemia)", "defn": "Bacterial infection in the bloodstream — a medical emergency — presents with fever hypotension and altered consciousness", "example": "He deteriorated rapidly overnight and developed septicaemia — he was transferred to the ICU immediately.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "INFECTIOUS DISEASE"}, {"expr": "Jaundice", "defn": "Yellow discolouration of skin and sclera — caused by elevated bilirubin — indicates liver or haemolytic disease", "example": "She developed jaundice three days after completing the antibiotic course — liver function tests were ordered.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "INFECTIOUS DISEASE"}, {"expr": "Torn rotator cuff", "defn": "A tear in the shoulder rotator cuff muscles — causes pain weakness and restricted movement", "example": "He was diagnosed with a torn rotator cuff following an MRI — surgery was considered after physiotherapy had failed.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "MUSCULOSKELETAL"}, {"expr": "Impingement syndrome", "defn": "A condition where shoulder tendons are compressed during arm movement — causes pain with overhead activities", "example": "She presented with shoulder impingement syndrome — she had been unable to reach above her head for three months.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "MUSCULOSKELETAL"}, {"expr": "Elective surgery", "defn": "A planned surgical procedure that is not an emergency — the patient can prepare in advance", "example": "The hernia repair was scheduled as elective surgery — he had a limited window to prepare beforehand.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "MUSCULOSKELETAL"}, {"expr": "Emergency surgery", "defn": "Unplanned surgery required urgently due to a life-threatening or acutely serious condition", "example": "The bowel obstruction required emergency surgery — there was no time for routine pre-operative preparation.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "MUSCULOSKELETAL"}, {"expr": "To disrupt the scar tissue", "defn": "A physiotherapy or surgical technique aimed at breaking down adhesions or fibrotic tissue", "example": "The physiotherapist used deep tissue massage to disrupt the scar tissue that had formed after the operation.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "MUSCULOSKELETAL"}, {"expr": "I have a few niggles in my knee", "defn": "Patient expression for minor intermittent pain or discomfort — not severe but noticeable", "example": "He said he had a few niggles in his knee when descending stairs but otherwise managed well.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "MUSCULOSKELETAL"}, {"expr": "Just a bit of a niggle", "defn": "A minor persistent discomfort that is not severely limiting — British English diminutive expression", "example": "She said it was just a bit of a niggle — not enough to stop her working but enough to notice every day.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "MUSCULOSKELETAL"}, {"expr": "Paid for it (idiom)", "defn": "Experienced consequences for overexertion — the pain or fatigue returned after physical activity", "example": "He had pushed through his physiotherapy session and really paid for it — he was unable to walk the next day.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "MUSCULOSKELETAL"}, {"expr": "The patient is alert and responsive", "defn": "Baseline neurological status — fully awake and appropriately answering questions", "example": "On assessment the patient was alert and responsive with a GCS of 15.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "CONSCIOUSNESS & MENTAL STATUS"}, {"expr": "The patient becomes less responsive", "defn": "A deterioration in level of consciousness — requires urgent assessment", "example": "Over the following hour the patient became less responsive and required immediate medical review.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "CONSCIOUSNESS & MENTAL STATUS"}, {"expr": "The patient appears dazed", "defn": "Mildly confused or disoriented — not fully alert but still conscious", "example": "He appeared dazed after the fall — he was able to speak but could not recall the event.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "CONSCIOUSNESS & MENTAL STATUS"}, {"expr": "The patient is drowsy but arousable", "defn": "Reduced but not absent consciousness — responds to stimulation", "example": "She was drowsy but arousable — she opened her eyes and responded to her name when called.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "CONSCIOUSNESS & MENTAL STATUS"}, {"expr": "The patient appears lethargic", "defn": "Unusually slow and sluggish — lacking normal energy and mental alertness", "example": "He appeared lethargic and was slow to answer questions — consistent with early encephalopathy.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "CONSCIOUSNESS & MENTAL STATUS"}, {"expr": "The patient is disoriented to time and place", "defn": "Unable to correctly identify the current time date or location — a sign of cognitive impairment or delirium", "example": "She was disoriented to time and place — she believed she was at home and could not recall the year.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "CONSCIOUSNESS & MENTAL STATUS"}, {"expr": "The patient became progressively unresponsive", "defn": "A worsening deterioration toward unconsciousness — a critical sign", "example": "He became progressively unresponsive over the afternoon — a code was called at 15:30.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "CONSCIOUSNESS & MENTAL STATUS"}, {"expr": "The patient is unconscious", "defn": "Complete loss of consciousness — no response to verbal or painful stimuli", "example": "By the time the ambulance arrived the patient was unconscious and not breathing normally.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "CONSCIOUSNESS & MENTAL STATUS"}, {"expr": "Fine tremor", "defn": "A subtle low-amplitude tremor — common with lithium or thyroid medication — usually visible in outstretched hands", "example": "It is quite common to notice a fine tremor when taking lithium — please hold out your hands so I can have a look.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "NEUROLOGICAL"}, {"expr": "Narrow therapeutic window", "defn": "The gap between an effective dose and a toxic dose is very small — requires close monitoring", "example": "Lithium has a very narrow therapeutic window — regular blood tests are essential to keep levels safe.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "NEUROLOGICAL"}, {"expr": "Coarse tremor", "defn": "A more obvious larger-amplitude tremor — indicates toxicity or severe neurological disturbance", "example": "If the fine tremor changes to a coarse tremor with obvious shaking please contact us immediately.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "NEUROLOGICAL"}, {"expr": "Slurred speech", "defn": "Dysarthria — unclear or indistinct speech — a sign of neurological impairment or drug toxicity", "example": "If you notice slurred speech or difficulty forming words seek medical attention urgently.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "NEUROLOGICAL"}, {"expr": "Profoundly drowsy", "defn": "Severe drowsiness beyond normal tiredness — a red flag for drug toxicity or neurological emergency", "example": "If you feel profoundly drowsy or cannot stay awake please call 111 immediately.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "NEUROLOGICAL"}, {"expr": "Strabismus / squint", "defn": "A misalignment of the eyes — one or both eyes turn inward outward or upward — also called strabismus or crossed eyes", "example": "She was referred to ophthalmology for assessment of her strabismus — it had been gradually worsening.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "NEUROLOGICAL"}, {"expr": "Epileptic seizure", "defn": "An episode of abnormal electrical activity in the brain — can cause convulsions loss of consciousness or absence", "example": "She was warned that stroboscopic lights at club venues can trigger epileptic seizures.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "NEUROLOGICAL"}, {"expr": "Compulsive action", "defn": "A behaviour performed automatically without deliberate thinking — associated with OCD or habitual use", "example": "A compulsive action is something you do automatically without thinking — the patient was unaware he was doing it.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "NEUROLOGICAL"}, {"expr": "Cerebral palsy", "defn": "A non-progressive neurological condition affecting movement and posture — caused by brain injury before or around birth", "example": "Patients with cerebral palsy often require mobility support devices and regular physiotherapy.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "NEUROLOGICAL"}, {"expr": "Bipolar disorder", "defn": "A mood disorder with alternating episodes of mania and depression", "example": "He had been diagnosed with bipolar disorder and was maintained on lithium for mood stabilisation.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "NEUROLOGICAL"}, {"expr": "Schizophrenia", "defn": "A severe mental illness characterised by hallucinations delusions and disorganised thinking", "example": "She had a history of schizophrenia and was taking clozapine — regular monitoring was required.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "NEUROLOGICAL"}, {"expr": "ADHD — Attention Deficit Hyperactivity Disorder", "defn": "A neurodevelopmental disorder characterised by inattention hyperactivity and impulsivity", "example": "ADHD stands for Attention Deficit Hyperactivity Disorder — it is typically managed with stimulant medication.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "NEUROLOGICAL"}, {"expr": "Shortness of breath", "defn": "Difficulty breathing or breathlessness — even at rest or with minimal exertion — also called dyspnoea", "example": "She reported shortness of breath even while walking slowly — her oxygen saturation was 91% on room air.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "SYMPTOMS — GENERAL CLINICAL LIST"}, {"expr": "Abdominal pain", "defn": "Pain in the abdomen — location character and radiation should all be assessed", "example": "He presented with severe abdominal pain in the right iliac fossa — appendicitis was the working diagnosis.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "SYMPTOMS — GENERAL CLINICAL LIST"}, {"expr": "Bloating", "defn": "A sensation of fullness or distension in the abdomen — common in IBS and food intolerances", "example": "Her main symptom was bloating after meals — it had been worsening over the past three months.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "SYMPTOMS — GENERAL CLINICAL LIST"}, {"expr": "Palpitations", "defn": "An awareness of the heartbeat — racing fluttering or pounding — always in plural form", "example": "She described palpitations that lasted for several minutes — an ECG was ordered to exclude arrhythmia.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "SYMPTOMS — GENERAL CLINICAL LIST"}, {"expr": "Numbness", "defn": "Loss of sensation in a body part — can indicate nerve compression poor circulation or neuropathy", "example": "He reported numbness in his fingers that was worse in the mornings — consistent with carpal tunnel syndrome.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "SYMPTOMS — GENERAL CLINICAL LIST"}, {"expr": "Fainting / Syncope", "defn": "A temporary loss of consciousness due to reduced blood flow to the brain — may be cardiac vasovagal or orthostatic", "example": "She fainted in the shower — a tilt-table test was arranged to investigate vasovagal syncope.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "SYMPTOMS — GENERAL CLINICAL LIST"}, {"expr": "Hair loss / Alopecia", "defn": "Loss of hair from the scalp or body — can be a side effect of chemotherapy or certain medications", "example": "She reported significant hair loss since starting the new medication — the pharmacist documented this as an adverse event.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "SYMPTOMS — GENERAL CLINICAL LIST"}, {"expr": "Bruising easily", "defn": "A tendency to develop bruises with minimal trauma — may indicate low platelets or anticoagulant therapy", "example": "She noticed she was bruising easily — a full blood count and coagulation screen were requested.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "SYMPTOMS — GENERAL CLINICAL LIST"}, {"expr": "Difficulty swallowing (dysphagia)", "defn": "Trouble moving food or liquid from the mouth to the stomach — requires urgent investigation", "example": "He reported progressive difficulty swallowing solids over two months — an urgent endoscopy was arranged.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "SYMPTOMS — GENERAL CLINICAL LIST"}, {"expr": "Excessive sweating", "defn": "Sweating beyond normal thermoregulation — may be a drug side effect infection or hormonal cause", "example": "She developed excessive sweating within days of starting the new antidepressant.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "SYMPTOMS — GENERAL CLINICAL LIST"}, {"expr": "Change in bowel habits", "defn": "Alteration in the frequency consistency or urgency of bowel motions — a red flag symptom requiring investigation", "example": "He reported a change in bowel habits over six weeks — alternating diarrhoea and constipation.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "SYMPTOMS — GENERAL CLINICAL LIST"}, {"expr": "Loss of appetite", "defn": "Reduced desire to eat — clinically significant if unexplained or persistent — may indicate malignancy depression or drug effect", "example": "She described a significant loss of appetite — she had lost four kilograms without trying over the past month.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "SYMPTOMS — GENERAL CLINICAL LIST"}, {"expr": "Joint swelling", "defn": "Visible enlargement of a joint due to fluid or inflammation — associated with gout arthritis or infection", "example": "The right knee showed marked joint swelling with warmth and tenderness — joint aspiration was performed.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "SYMPTOMS — GENERAL CLINICAL LIST"}, {"expr": "Chest tightness", "defn": "A squeezing or pressure sensation in the chest — may indicate cardiac respiratory or musculoskeletal cause", "example": "He described chest tightness on exertion — a stress ECG was arranged to rule out cardiac ischaemia.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "SYMPTOMS — GENERAL CLINICAL LIST"}, {"expr": "Mood swings", "defn": "Rapid or unpredictable changes in emotional state — may be a drug side effect or indicate a mood disorder", "example": "She reported significant mood swings since starting the new contraceptive — an alternative was discussed.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "SYMPTOMS — GENERAL CLINICAL LIST"}, {"expr": "Blurred vision", "defn": "Loss of visual clarity — may indicate ocular side effects of medication or systemic disease", "example": "She reported blurred vision that had started after the new medication was commenced — an ophthalmology referral was arranged.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "SYMPTOMS — GENERAL CLINICAL LIST"}, {"expr": "Frequent urination", "defn": "Increased frequency of passing urine — may indicate urinary tract infection diabetes or medication effect", "example": "He reported frequent urination especially at night — a urine dipstick and blood glucose were checked.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "SYMPTOMS — GENERAL CLINICAL LIST"}, {"expr": "Hot flashes", "defn": "Sudden sensations of intense body heat — common in menopause or as a side effect of some medications", "example": "She described hot flashes that woke her several times a night — HRT was discussed as an option.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "SYMPTOMS — GENERAL CLINICAL LIST"}, {"expr": "I noticed a potential clinical issue with this prescription", "defn": "A professional and non-accusatory way to raise a prescribing concern with a GP", "example": "I noticed a potential clinical issue with this prescription and wanted to discuss it with you before dispensing.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "PHARMACY LETTERS & CLINICAL COMMUNICATION"}, {"expr": "The patient's eGFR is reduced which may affect this medication", "defn": "Standard pharmacist communication about renal function and drug dosing", "example": "The patient's eGFR is reduced at 28 mL/min which may affect the safety of this medication at the current dose.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "PHARMACY LETTERS & CLINICAL COMMUNICATION"}, {"expr": "I am writing to express my professional concern regarding", "defn": "Formal opening for a pharmacist referral letter — clinical concern about a patient", "example": "I am writing to express my professional concern regarding Mr Henderson's medication adherence and his current clinical status.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "PHARMACY LETTERS & CLINICAL COMMUNICATION"}, {"expr": "During his visit to the pharmacy today for a repeat prescription", "defn": "Context-setting phrase in a referral letter — establishes when the issue was identified", "example": "During his visit to the pharmacy today for a repeat prescription I observed that his blood pressure was elevated at 175/95.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "PHARMACY LETTERS & CLINICAL COMMUNICATION"}, {"expr": "His blood pressure was persistently elevated", "defn": "A clinical observation documented in a referral letter — signals hypertension not at target", "example": "Upon taking his blood pressure I found it was persistently elevated at 165/95 mmHg on two consecutive readings.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "PHARMACY LETTERS & CLINICAL COMMUNICATION"}, {"expr": "Upon reviewing his dispensing history", "defn": "A pharmacist audit phrase — used when reviewing medication collection records to identify non-adherence", "example": "Upon reviewing his dispensing history it appears that he has been collecting his antihypertensive medication inconsistently.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "PHARMACY LETTERS & CLINICAL COMMUNICATION"}, {"expr": "A formal medication review may be necessary", "defn": "A professional recommendation that the prescriber reassess the patient's overall drug therapy", "example": "Given the complexity of his current regimen a formal medication review may be necessary.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "PHARMACY LETTERS & CLINICAL COMMUNICATION"}, {"expr": "I would recommend a review of his medication regimen to ensure safe use and optimise his treatment", "defn": "Standard OET Writing closing recommendation phrase — specific and action-oriented", "example": "I would recommend a review of his medication regimen to ensure safe use and optimise his treatment given his declining renal function.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "PHARMACY LETTERS & CLINICAL COMMUNICATION"}, {"expr": "Please do not hesitate to contact me if further information is required", "defn": "Standard professional closing for a referral or communication letter", "example": "Please do not hesitate to contact me if further information is required — I am available on the number below.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "PHARMACY LETTERS & CLINICAL COMMUNICATION"}, {"expr": "Her symptoms are suggestive of fluid retention and possible deterioration in renal function", "defn": "Clinical interpretation phrase — symptoms point toward a diagnosis without confirming it", "example": "Her ankle oedema and weight gain are suggestive of fluid retention and possible deterioration in renal function.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "PHARMACY LETTERS & CLINICAL COMMUNICATION"}, {"expr": "I am writing to raise concerns regarding", "defn": "Formal letter opener for expressing a clinical concern — less confrontational than 'I am writing to complain'", "example": "I am writing to raise concerns regarding the patient's current medication regimen and recent clinical changes.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "PHARMACY LETTERS & CLINICAL COMMUNICATION"}, {"expr": "He was counselled on", "defn": "Standard OET Writing phrase — documents that the patient received advice on a specific topic", "example": "He was counselled on the importance of medication adherence and the risks associated with stopping his antihypertensive abruptly.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "PHARMACY LETTERS & CLINICAL COMMUNICATION"}, {"expr": "The patient reported increasing use of", "defn": "Documents self-reported escalation of a substance or medication", "example": "The patient reported increasing use of ibuprofen over the past month — up to six tablets daily.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "PHARMACY LETTERS & CLINICAL COMMUNICATION"}, {"expr": "I would recommend an urgent review", "defn": "A stronger recommendation phrase — appropriate when the clinical situation is time-sensitive", "example": "I would recommend an urgent review to assess for possible methotrexate toxicity given his reported symptoms.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "PHARMACY LETTERS & CLINICAL COMMUNICATION"}, {"expr": "I observed that his blood pressure was persistently elevated at 165 over 95", "defn": "Specific documented clinical observation — includes the numeric reading for precision", "example": "I observed that his blood pressure was persistently elevated at 165 over 95 mmHg on repeat measurement.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "PHARMACY LETTERS & CLINICAL COMMUNICATION"}, {"expr": "It appears that he has been irregular in collecting his primary antihypertensive medication", "defn": "A non-accusatory documentation phrase for non-adherence identified via dispensing records", "example": "It appears that he has been irregular in collecting his primary antihypertensive medication — there have been three gaps of over two weeks in the past six months.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "PHARMACY LETTERS & CLINICAL COMMUNICATION"}, {"expr": "While I have provided initial counselling", "defn": "Acknowledges pharmacist's prior action before recommending further review", "example": "While I have provided initial counselling on the importance of consistency a formal medication review may be necessary.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "PHARMACY LETTERS & CLINICAL COMMUNICATION"}, {"expr": "A formal medication review may be necessary", "defn": "Referral recommendation phrase — appropriate when a pharmacist has reached the limit of their scope", "example": "A formal medication review may be necessary to determine whether the current regimen remains appropriate.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "PHARMACY LETTERS & CLINICAL COMMUNICATION"}, {"expr": "He admitted to inadvertently skipping doses due to forgetfulness", "defn": "Documented patient self-report of unintentional non-adherence", "example": "He admitted to inadvertently skipping doses due to forgetfulness — a once-daily formulation or dosette box was discussed.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "PHARMACY LETTERS & CLINICAL COMMUNICATION"}, {"expr": "Expressed concerns regarding the adverse effects specifically a persistent dry cough", "defn": "Documents the patient's reported side effect in formal language", "example": "She expressed concerns regarding the adverse effects — specifically a persistent dry cough which she believed started after the recent dosage titration.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "PHARMACY LETTERS & CLINICAL COMMUNICATION"}, {"expr": "Given his comorbidities and the increased risk of cardiovascular events", "defn": "Clinical reasoning phrase — connects the patient's background conditions to the clinical decision", "example": "Given his comorbidities and the increased risk of cardiovascular events I am concerned that his current regimen may no longer be optimal.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "PHARMACY LETTERS & CLINICAL COMMUNICATION"}, {"expr": "Could you please evaluate whether a switch to an ARB might be more appropriate", "defn": "A pharmacist's recommendation framed as a request to the prescriber — collaborative tone", "example": "Could you please evaluate whether a switch to an ARB might be more appropriate to mitigate the side effects while maintaining efficacy?", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "PHARMACY LETTERS & CLINICAL COMMUNICATION"}, {"expr": "I believe this intervention would significantly enhance his compliance and overall treatment outcomes", "defn": "A strong outcome-focused closing statement in a pharmacist letter", "example": "I believe this intervention would significantly enhance his compliance and overall treatment outcomes given his current difficulties.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "PHARMACY LETTERS & CLINICAL COMMUNICATION"}, {"expr": "Should her eGFR fall below 30 mL/min a complete cessation of Metformin may be necessary", "defn": "Conditional clinical statement — documents a threshold for medication change", "example": "Should her eGFR fall below 30 mL/min/1.73m² a complete cessation of Metformin may be necessary to prevent lactic acidosis.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "PHARMACY LETTERS & CLINICAL COMMUNICATION"}, {"expr": "Amiodarone is prescribed to manage atrial fibrillation", "defn": "Standard counselling opening — names the drug and its indication", "example": "Amiodarone is prescribed to manage atrial fibrillation — it is a very effective but complex medication with several important side effects.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "MEDICATION COUNSELLING — SPECIFIC DRUGS"}, {"expr": "Patient is starting a loading dose to build up levels in the body", "defn": "Explains the purpose of a higher initial dose — important for patient understanding and adherence", "example": "You are starting a loading dose to build up the drug levels in your body — the dose will be reduced after a few weeks.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "MEDICATION COUNSELLING — SPECIFIC DRUGS"}, {"expr": "Patient must use high-factor sunscreen even on cloudy days", "defn": "Amiodarone counselling point — causes photosensitivity — essential safety advice", "example": "You must use high-factor sunscreen every day even on cloudy days — amiodarone makes your skin very sensitive to UV light.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "MEDICATION COUNSELLING — SPECIFIC DRUGS"}, {"expr": "Development of a blue-grey skin discolouration", "defn": "A known and permanent side effect of long-term amiodarone — must be disclosed upfront", "example": "I need to let you know that long-term amiodarone can cause a blue-grey skin discolouration — this is not dangerous but is permanent.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "MEDICATION COUNSELLING — SPECIFIC DRUGS"}, {"expr": "You may notice halos around lights at night", "defn": "An ocular side effect of amiodarone — common and usually mild", "example": "You may notice halos around lights at night — this is a recognised effect of amiodarone and is usually not elop swallowing pain or heartburn after taking the tablet — these can be signs of oesophageal damage.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "MEDICATION COUNSELLING — SPECIFIC DRUGS"}, {"expr": "Writing the exact frequency is vital", "defn": "Documentation principle — the exact dosing frequency must be clearly written in any clinical letter or note", "example": "When documenting the prescription writing the exact frequency is vital — once daily versus twice daily can have significant clinical implications.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "MEDICATION COUNSELLING — SPECIFIC DRUGS"}, {"expr": "The anti-inflammatory medication you are taking may reduce blood flow to your kidneys", "defn": "Patient-friendly explanation of NSAID nephrotoxicity", "example": "The anti-inflammatory medication you are taking may reduce blood flow to your kidneys — this is why we recommend using it only when necessary.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "MEDICATION COUNSELLING — SPECIFIC DRUGS"}, {"expr": "When this medicine is taken together with your blood pressure medication and diuretics it may further impair kidney function", "defn": "Triple whammy effect counselling — NSAIDs plus ACE inhibitor plus diuretic", "example": "When this medicine is taken together with your blood pressure medication and diuretics it may further impair kidney function — this combination should generally be avoided.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "MEDICATION COUNSELLING — SPECIFIC DRUGS"}, {"expr": "Reduced kidney function may also affect how your diabetes medication is processed in your body", "defn": "Explains the clinical impact of renal impairment on metformin clearance", "example": "Reduced kidney function may also affect how your diabetes medication is processed in your body — specifically the risk of metformin : "MEDICATION COUNSELLING — SPECIFIC DRUGS"}, {"expr": "I would recommend a review of the patient's medication regimen", "defn": "A professional recommendation to a prescriber — invites clinical collaboration", "example": "I would recommend a review of the patient's medication regimen in light of his recent blood test results.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "MEDICATION COUNSELLING — SPECIFIC DRUGS"}, {"expr": "It's quite common to notice a fine tremor", "defn": "Reassurance phrase — normalises a benign drug side effect", "example": "It is quite common to notice a fine tremor when taking this medication — please show me your hands so I can assess it.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "MEDICATION COUNSELLING — SPECIFIC DRUGS"}, {"expr": "Lithium has a very narrow therapeutic window", "defn": "Core lithium counselling fact — explains why monitoring is essential", "example": "Lithium has a very narrow therapeutic window — the difference between a helpful dose and a toxic one is very small.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "MEDICATION COUNSELLING — SPECIFIC DRUGS"}, {"expr": "If that changes to a coarse tremor where the shaking becomes much more obvious or jerky", "defn": "Lithium toxicity warning — escalation sign that requires urgent review", "example": "If the fine tremor changes to a coarse tremor where the shaking becomes much more obvious or jerky please contact us immediately.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "MEDICATION COUNSELLING — SPECIFIC DRUGS"}, {"expr": "If you start to have slurred speech feel profoundly drowsy or experience severe vomiting", "defn": "Lithium toxicity red flag symptoms — requires immediate medical attention", "example": "If you start to have slurred speech feel profoundly drowsy or experience severe vomiting seek emergency medical care immediately.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "MEDICATION COUNSELLING — SPECIFIC DRUGS"}, {"expr": "Diagnosis was confirmed by a bone density scan", "defn": "Standard clinical documentation phrase — names the investigation that confirmed the diagnosis", "example": "The diagnosis of osteoporosis was confirmed by a bone density scan showing a T-score of minus 2.8.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "MEDICATION COUNSELLING — SPECIFIC DRUGS"}, {"expr": "Not supposed to lie down for at least 30 minutes after administration", "defn": "Alendronate dosing instruction — prevents oesophageal irritation", "example": "You are not supposed to lie down for at least 30 minutes after taking this tablet — it must be swallowed with a full glass of water while sitting upright.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "MEDICATION COUNSELLING — SPECIFIC DRUGS"}, {"expr": "Mrs Rossi must remain upright for at least 30 minutes following the administration of Alendronate to prevent esophageal irritation", "defn": "Formal instruction in an OET care home letter — specific patient name drug and rationale included", "example": "Regarding specific precautions Mrs Rossi must remain upright for at least 30 minutes following the administration of Alendronate to prevent oesophageal irritation.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "MEDICATION COUNSELLING — SPECIFIC DRUGS"}, {"expr": "Asymptomatic / subclinical", "defn": "No symptoms are present — the condition exists but is not yet detectable through symptoms alone", "example": "She was asymptomatic at the time of diagnosis — the condition was detected incidentally on a blood test.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "SEVERITY SCALE VOCABULARY"}, {"expr": "Negligible", "defn": "So small as to be unimportant — does not require clinical attention", "example": "The interaction between these two drugs is negligible at standard doses and does not require any action.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "SEVERITY SCALE VOCABULARY"}, {"expr": "Minimal / slight / minor", "defn": "A very small amount of change or pain — present but barely noticeable", "example": "She reported minimal discomfort at the injection site — no treatment was required.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "SEVERITY SCALE VOCABULARY"}, {"expr": "Mild", "defn": "Present and noticeable but not significantly limiting daily activities", "example": "He had mild symptoms that did not prevent him from working — watchful waiting was recommended.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "SEVERITY SCALE VOCABULARY"}, {"expr": "Moderate", "defn": "Between mild and severe — requires management but not emergency intervention", "example": "Her condition was classified as moderate — pharmacological treatment was initiated.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "SEVERITY SCALE VOCABULARY"}, {"expr": "Moderately severe", "defn": "Beyond moderate — approaching severe — may require dose change or escalation of treatment", "example": "The pain was described as moderately severe — the current analgesia was no longer sufficient.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "SEVERITY SCALE VOCABULARY"}, {"expr": "Severe", "defn": "Significantly affecting function — requires active treatment — may require hospitalisation", "example": "She presented with severe symptoms that had prevented her from leaving the house for three days.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "SEVERITY SCALE VOCABULARY"}, {"expr": "Critical / acute / extreme", "defn": "Life-threatening or immediately dangerous — requires emergency management", "example": "He was in a critical condition on arrival — he was taken directly to the resuscitation bay.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "SEVERITY SCALE VOCABULARY"}, {"expr": "Profound", "defn": "A complete or near-complete loss of a specific function — often used with hearing or cognition", "example": "She had a profound hearing loss in her right ear following the infection — cochlear implant was discussed.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "SEVERITY SCALE VOCABULARY"}, {"expr": "What have you been taking to deal with the pain", "defn": "Open clinical question for self-medication history — non-judgemental phrasing", "example": "What have you been taking to deal with the pain? That helps me make sure nothing interacts with what I'd like to recommend.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "Did you try any other sort of treatment apart from the medications", "defn": "Open question about non-pharmacological self-management", "example": "Did you try any other sort of treatment apart from the medications — such as heat packs rest or physiotherapy?", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "The pharmacist responds with heavy medical jargon and the patient just zones out", "defn": "A teaching point — using complex language loses patient engagement", "example": "If the pharmacist responds with heavy medical jargon the patient just zones out — always aim for plain language.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "It has the exact same active ingredient as your usual brand — it is just made by a different company and costs less", "defn": "Generic substitution explanation — reassures patient about equivalence", "example": "It has the exact same active ingredient as your usual brand — it is just made by a different company and costs less. The effect will be identical.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "If you have been under the weather this medication will help you recover", "defn": "Empathetic counselling opener using patient language", "example": "If you have been under the weather lately this medication will help your body recover more quickly.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "Acknowledging the patient's anxiety will instantly build rapport", "defn": "A communication principle — validated empathy improves the consultation quality", "example": "Acknowledging the patient's anxiety will instantly build rapport — start by saying 'I can see this has been worrying for you.'", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "Presented to my pharmacy", "defn": "Standard OET writing phrase — documents how the patient came to the pharmacist", "example": "He presented to my pharmacy today requesting a repeat supply of his regular medications.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "Sought an over-the-counter remedy for a cough", "defn": "Documents the patient's self-referral reason in a clinical letter", "example": "She sought an over-the-counter remedy for a cough — during the consultation I identified a potential drug interaction.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "Developed a dry tickly cough that worsens at night and causes insomnia", "defn": "Detailed symptom description — includes character timing and functional impact", "example": "He developed a dry tickly cough that worsens at night and causes insomnia — this is consistent with an ACE inhibitor cough.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "I noticed a potential clinical issue with this prescription", "defn": "Professional non-threatening opener when calling a prescriber about a concern", "example": "I noticed a potential clinical issue with this prescription — I wanted to run it by you before dispensing.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "Presented to my pharmacy today for a repeat prescription", "defn": "Standard OET clinical opening — establishes context for the encounter", "example": "She presented to my pharmacy today for a repeat prescription of her antihypertensive medication.", "batch": "202604 Batch — Pain / Gout / Neurology / Pharmacy Letters", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "alcohol abstinence", "defn": "Complete avoidance of alcohol — stronger than moderation or reduction", "example": "Complete alcohol abstinence is essential during metronidazole — even small amounts cause flushing and nausea.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "ferrous sulfate", "defn": "Iron supplement prescribed for iron deficiency anaemia", "example": "Ferrous sulfate is best absorbed on an empty stomach but can be taken with food if GI side effects occur.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "absorption", "defn": "The process by which a drug or nutrient passes from the gut into the bloodstream", "example": "Taking ferrous sulfate with food may slightly reduce absorption but is preferable to stopping altogether.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "course (of treatment)", "defn": "A prescribed duration of treatment — must be completed even if symptoms improve", "example": "It is important to complete the full course of ferrous sulfate even if you start feeling better.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "dark stools", "defn": "Darkening of bowel motions — common harmless side effect of ferrous sulfate", "example": "Your stools may appear darker than usual — this is nothing to be concerned about and is simply the iron passing through.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "it is nothing to be concerned about", "defn": "Reassurance phrase for harmless side effects", "example": "The dark colour is nothing to be concerned about — it is a well-known and harmless effect of this medication.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "even if you start feeling better", "defn": "Pre-empts premature discontinuation — patient must continue despite symptom improvement", "example": "Even if you start feeling better please continue taking the full course — your iron stores need more time to recover.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "this may slightly reduce absorption but it is better than stopping altogether", "defn": "Balancing phrase — acknowledges a compromise while recommending continuation", "example": "Taking it with food may slightly reduce absorption but it is better than stopping altogether if the side effects are too uncomfortable.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "digoxin", "defn": "Cardiac glycoside — narrow therapeutic index — used for heart failure and atrial fibrillation", "example": "Digoxin has a narrow therapeutic index — even small changes in dose can lead to toxicity.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "from now on", "defn": "Forward-looking time marker — signals a new ongoing instruction", "example": "From now on please inform your pharmacist about all supplements you take including herbal products.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "even if it is herbal or from a health food shop", "defn": "Emphasises that natural products can still interact with prescription medicines", "example": "Please tell your pharmacist about everything you take — even if it is herbal or from a health food shop.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "sertraline", "defn": "SSRI antidepressant — takes 2 to 4 weeks to show full effect — do not stop suddenly", "example": "Sertraline may take two to four weeks to have its full effect — do not stop taking it suddenly without medical advice.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "serotonin syndrome", "defn": "Potentially life-threatening reaction from excess serotonin activity — caused by combining serotonergic drugs", "example": "Combining sertraline with St John's Wort significantly increases the risk of serotonin syndrome.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "St John's Wort", "defn": "Herbal supplement with antidepressant and enzyme-inducing properties — interacts with many prescription drugs", "example": "St John's Wort is available over the counter but can seriously affect how prescription medications work.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "I can see you are struggling with your mood", "defn": "Empathy opener — validates emotional state without diagnosing — invites further discussion", "example": "I can see you are struggling with your mood — would it be alright if I asked a few more questions about how you have been feeling?", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "anaphylaxis can happen unexpectedly so being prepared is life-saving", "defn": "Core anaphylaxis counselling statement — emphasises unpredictability and importance of carrying auto-injector", "example": "Anaphylaxis can happen unexpectedly so being prepared is life-saving — always carry your adrenaline auto-injector.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "when eating out always tell the restaurant or chef about your severe peanut allergy", "defn": "Standard allergy counselling — do not assume staff will remember", "example": "When eating out always tell the restaurant or chef about your severe peanut allergy — do not assume they will remember.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "consolidate", "defn": "To combine or simplify into one — in pharmacy: organise medications into a simpler regimen — in respiratory: alveoli filled with fluid (e.g. pneumonia)", "example": "The pharmacist suggested consolidating the morning medications into a single dose time to improve adherence.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "combine (verb)", "defn": "To use or give together — do not combine X with Y = do not take at the same time", "example": "It is essential that you do not combine St John's Wort with sertraline.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "vital stats", "defn": "Informal term for vital signs — a group of measurements: BP / HR / RR / Temp / SpO2", "example": "The nurse reported that the patient's vital stats are stable — BP 118 over 76 heart rate 74 sats 98 percent.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "decongestant", "defn": "Drug that relieves nasal congestion — must not be used more than 3 to 5 days due to rebound risk", "example": "The pharmacist advised against using the decongestant for more than three consecutive days.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "rebound (congestion)", "defn": "Worsening of congestion after stopping or overusing a nasal decongestant — also called rhinitis medicamentosa", "example": "Prolonged use of nasal decongestants can lead to rebound congestion — the congestion returns worse than before.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "saline", "defn": "Sodium chloride solution — used as nasal spray or IV fluid — safer long-term alternative to decongestants", "example": "A saline nasal spray can help relieve congestion without the risk of rebound effects.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "it may not work as quickly as the decongestant", "defn": "Expectation-management phrase — used when recommending a safer but slower alternative", "example": "It may not work as quickly as the decongestant but it is much safer for long-term use.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "it should help you feel better", "defn": "Closing reassurance phrase — modal should = confident expectation without over-promising", "example": "Keep using it regularly — it should help you feel better within a few days.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "warfarin", "defn": "Vitamin K antagonist anticoagulant — narrow therapeutic index — many drug and food interactions", "example": "Patients taking warfarin must be counselled carefully about interactions — including decongestants and NSAIDs.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "X-ray machine at airport security may alarm if carrying insulin supplies", "defn": "Travel counselling for diabetic patients — metal in devices may trigger security alarms — carry a medical letter", "example": "You should be aware that the X-ray machine at airport security may alarm when carrying insulin supplies — I recommend getting a letter from your GP.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "resistance", "defn": "Reduced effectiveness of a drug — bacteria or the body no longer responding — or drug interaction reducing plasma levels", "example": "Rifampicin can reduce the effectiveness of oral contraceptives through enzyme induction — not true resistance but a similar effect.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "contraceptive", "defn": "A drug or device that prevents pregnancy — oral contraceptive effectiveness reduced by enzyme inducers", "example": "Rifampicin significantly reduces the effectiveness of the contraceptive pill — additional contraception is required.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "rifampicin", "defn": "Potent hepatic enzyme inducer used in TB treatment — reduces plasma levels of many co-administered drugs", "example": "Rifampicin interacts with warfarin oral contraceptives digoxin and many other medications.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "tuberculosis", "defn": "Infectious disease caused by Mycobacterium tuberculosis — treated with combination antibiotic therapy for at least 6 months", "example": "Tuberculosis is treated with a combination of rifampicin isoniazid pyrazinamide and ethambutol.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "reduces effectiveness", "defn": "Standard phrase for drug interaction where one drug lowers the therapeutic effect of another", "example": "Rifampicin reduces the effectiveness of the oral contraceptive pill by inducing liver enzymes that speed up its metabolism.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "insulin administration", "defn": "The process of injecting insulin — includes technique site rotation timing and storage", "example": "Correct insulin administration technique including site rotation is essential to prevent lipodystrophy.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "insulin supplies", "defn": "All items needed for insulin management — pens needles syringes glucose monitor lancets strips", "example": "When travelling always carry insulin supplies in hand luggage along with a medical letter.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "supplement", "defn": "Vitamin or dietary addition — not a prescription medicine — can still cause drug interactions", "example": "When a patient says they take supplements always clarify — some herbal products like St John's Wort interact with prescription medicines.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "schedule an endoscopy", "defn": "To arrange a booking for an endoscopic procedure — clinical recommendation language", "example": "Given your symptoms I would like to schedule an endoscopy to examine the lining of your stomach directly.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "lining of the stomach", "defn": "Patient-friendly term for the gastric mucosa — the inner surface of the stomach", "example": "The endoscopy allows us to look directly at the lining of your stomach and check for inflammation or ulcers.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "tummy pain", "defn": "Informal patient language for abdominal pain — especially used by or with children", "example": "She described the tummy pain as a burning sensation that starts about twenty minutes after eating.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "pinched nerve", "defn": "Patient language for nerve compression or entrapment — may cause radiating pain or numbness", "example": "She was concerned the shooting pain in her arm might be a pinched nerve in her neck.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "heating pad", "defn": "An electric heated pad used for symptom relief — British equivalent of hot water bottle", "example": "She had been using a heating pad on her lower back but the relief was only temporary.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "magnetism from the machine", "defn": "Patient-friendly explanation of the magnetic field in an MRI scanner — relevant for patients with metal implants", "example": "Patients with certain implants cannot have an MRI because of the magnetism from the machine.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "I have gone through your notes", "defn": "Clinical consultation opener — signals the clinician has reviewed the records and is prepared", "example": "I have gone through your notes and I can see you have been experiencing these symptoms for some time.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "the last sort of month it has been more and more", "defn": "Patient language for escalating symptoms over approximately one month — hedge word sort of signals approximation", "example": "The last sort of month it has been more and more — I can barely get through a meal without the pain starting.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "the worst has been in the last month", "defn": "Patient self-assessment of symptom peak — superlative signals clinical significance", "example": "Long before that the last six months were tough but the worst has been in the last month.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "I have been trying bits and pieces", "defn": "Patient has self-managed with various remedies without a systematic approach — signals prior self-medication", "example": "I have been trying bits and pieces — antacids cutting out coffee — but nothing works long-term.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "particularly when you have food I suppose", "defn": "Clinician checking a possible trigger — hedged question using I suppose to soften the assumption", "example": "Given that you have this problem particularly when you have food I suppose — does the pain tend to start after meals?", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "to be precise", "defn": "Self-correction marker — the figure that follows is the accurate one — overrides the estimate before it", "example": "The pain starts about twenty minutes after eating — thirty minutes to be precise.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "I can still get the symptoms", "defn": "Patient reports symptoms persist despite treatment or avoidance — signals incomplete resolution", "example": "Even when I follow all the dietary advice I can still get the symptoms — usually late at night.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "I have swallowed a knife and it is stabbing inside my tummy", "defn": "Patient metaphor for sharp stabbing epigastric pain — decode as: sharp pain", "example": "It feels like I have swallowed a knife and it is stabbing inside my tummy — that is the only way I can describe it.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "something is on fire inside my tummy", "defn": "Patient metaphor for burning epigastric pain — decode as: pyrosis / burning sensation", "example": "There is something on fire inside my tummy — a burning feeling that goes all the way up to my chest.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "Can I know a little bit more about your diet", "defn": "Soft open question about dietary habits — less direct than asking about diet", "example": "Can I know a little bit more about your diet? Sometimes certain foods can trigger these kinds of symptoms.", "batch": "Previous Batches (Set 1–11 + House MD)", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "I haven't pinpointed anythin
