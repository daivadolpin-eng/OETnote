une response", "defn": "The body's defensive reaction to a pathogen or foreign substance — fever is one manifestation of this response", "example": "Fever is the body's immune response to an infection or pathogen entering the system.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "exceed", "defn": "To go beyond a defined limit or threshold — used with temperature dosage and clinical parameters", "example": "Fever is defined as a core body temperature exceeding 38 degrees Celsius.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "prolonged", "defn": "Lasting for longer than expected or desired — Richard used this frequently: prolonged fever / prolonged use / prolonged exposure", "example": "Prolonged fever may result in dehydration and requires medical review if it does not resolve within 48 hours.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "interval", "defn": "A defined period of time between events or measurements — used in monitoring frequency instructions", "example": "Body temperature should be measured at regular intervals — every four hours during an acute febrile illness.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "COPD (Chronic Obstructive Pulmonary Disease)", "defn": "A serious progressive lung condition caused primarily by long-term smoking — characterised by airflow limitation — always give the full form on first use", "example": "COPD, which is a chronic respiratory disease, was identified as the primary reason for his progressive breathlessness.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "cardiovascular disease", "defn": "Disease affecting the heart and blood vessels — a major consequence of smoking hypertension and diabetes", "example": "Smoking increases blood pressure which leads to cardiovascular disease and significantly raises the risk of stroke.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "second-hand smoke", "defn": "Tobacco smoke inhaled involuntarily by non-smokers — also called passive smoking — stress on first word SEK-und", "example": "Children exposed to second-hand smoke are at increased risk of respiratory infections and impaired cognitive development.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "nicotine dependence", "defn": "The clinical term for nicotine addiction — preferred in formal and OET writing over nicotine addiction", "example": "Nicotine dependence makes smoking cessation particularly challenging without appropriate pharmacological support.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "cessation", "defn": "The act of stopping something permanently — especially smoking — a key clinical noun in OET — stress on se-SAY-shun", "example": "Smoking cessation is strongly recommended and pharmacological support such as nicotine replacement therapy is available.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "impair", "defn": "To weaken damage or reduce the effectiveness of a function or ability — stress on im-PAIR", "example": "Second-hand smoke can impair cognitive function and respiratory development in children exposed during early childhood.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "detrimental", "defn": "Causing harm or damage — a high-register clinical adjective — stress on det-rih-MEN-tul", "example": "The detrimental effects of smoking extend beyond the individual to affect family members and the wider healthcare system.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "vulnerable", "defn": "Susceptible to harm or at increased risk — stress on VUL-ner-uh-bul", "example": "Children are more vulnerable than adults to the effects of second-hand smoke on respiratory and cognitive development.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "deteriorate", "defn": "To become progressively worse — INTRANSITIVE: cannot take a direct object — the thing itself deteriorates", "example": "Without treatment the patient's respiratory function deteriorated steadily over the following months.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "pharmacological support", "defn": "Treatment using medication — used when advising patients about cessation aids such as nicotine patches or varenicline", "example": "Nicotine dependence makes cessation challenging without pharmacological support such as varenicline or nicotine replacement therapy.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "spitting up / vomiting milk (infant)", "defn": "Informal term for infant regurgitation — when a baby brings up milk after feeding. 'Spitting up' is the colloquial patient term; clinically it may indicate gastro-oesophageal reflux. Distinguish from projectile vomiting (which may signal pyloric stenosis). OET context: parents use 'spitting up' — you must recognise it and ask clarifying questions about frequency, volume, and weight gain.", "example": "The mother reported that the baby had started spitting up after every feed — the pharmacist asked how much milk was coming back up and whether the baby was still gaining weight.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "resuscitation", "defn": "The emergency process of restoring breathing and circulation — includes CPR (chest compressions + rescue breaths), defibrillation, and advanced airway management. Pronounced: reh-SUS-ih-TAY-shun (5 syllables, stress on TAY). OET context: pharmacists may need to explain resuscitation status or refer to it when discussing emergency action plans with patients or carers.", "example": "The emergency team commenced resuscitation immediately — chest compressions were started while the defibrillator was being prepared.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "The parents are devastated", "defn": "Expression used when parents receive extremely distressing news about their child — often following a serious diagnosis, deterioration, or death. 'Devastated' = deeply shocked and grief-stricken. OET context: recognising and responding to parental distress is a key communication skill — acknowledge the emotion before providing information.", "example": "The parents were absolutely devastated when they were told the diagnosis — the pharmacist paused, expressed empathy, and allowed them time before continuing the counselling.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "emotional toll (on healthcare workers)", "defn": "The psychological burden experienced by doctors, nurses, and pharmacists when patients — especially children — deteriorate or die. 'Toll' = cumulative cost or damage. OET context: awareness of clinician wellbeing, burnout, and compassion fatigue. Relevant when discussing occupational health or peer support in healthcare settings.", "example": "The emotional toll of losing a paediatric patient is significant — many healthcare workers benefit from structured debriefing sessions and peer support programmes.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "utensils", "defn": "Tools or implements used for a specific purpose — in a clinical or OET context, often refers to feeding utensils (spoons, syringes, measuring cups) for administering medication or food to patients, especially children or elderly patients. Pronounced: yoo-TEN-silz (3 syllables, stress on TEN).", "example": "The pharmacist advised the mother to use the oral syringe provided rather than household utensils, as the dosing markings ensure the correct amount of medicine is given.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "enlarged spleen / risk of rupture (splenomegaly)", "defn": "Splenomegaly = abnormal enlargement of the spleen — can be caused by infections (e.g. glandular fever / EBV), liver disease, or blood disorders. A significantly enlarged spleen is at risk of rupture — a surgical emergency — especially with physical trauma. OET context: advise patients with splenomegaly to avoid contact sports and heavy lifting.", "example": "The pharmacist noted from the patient's file that he had an enlarged spleen — she advised him to avoid contact sports and to seek urgent help if he experienced sudden severe left-sided abdominal pain, which could indicate a rupture.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "stigmata (clinical context)", "defn": "In medicine, 'stigmata' (plural of stigma) refers to physical signs or marks that indicate a particular disease — e.g. 'stigmata of chronic liver disease' includes jaundice, spider naevi, and palmar erythema. Not to be confused with the religious meaning or the social meaning (shame/discrimination). Pronounced: STIG-muh-tuh (3 syllables, stress on STIG).", "example": "On examination the patient showed several stigmata of chronic liver disease — jaundice, spider naevi on the chest, and palmar erythema were all present.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "convent", "defn": "A religious community of women (nuns) living under vows — relevant in OET or clinical contexts when a patient's lifestyle, contraception choices, or social history involves religious life. A patient living in a convent may have different healthcare needs or beliefs about treatment. Pronounced: KON-vent (2 syllables, stress on KON).", "example": "The patient had lived in a convent for many years — the pharmacist was sensitive to her religious beliefs when discussing treatment options and respected her preferences.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "copper IUD (intrauterine device)", "defn": "A small T-shaped copper device inserted into the uterus as a form of long-term reversible contraception — also used as emergency contraception. Works by releasing copper ions which are toxic to sperm. Contains no hormones — suitable for women who cannot use hormonal contraception. IUD = intrauterine device. Pronounced: IN-truh-YOO-ter-in. OET: relevant in contraception counselling or gynaecological history.", "example": "The patient had been using a copper IUD for several years — the pharmacist confirmed she had no symptoms of infection or displacement and reminded her of the importance of regular follow-up with her GP.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "nun", "defn": "A woman who has taken religious vows and lives in a convent — relevant in OET contexts when taking a social or contraceptive history. Important for OET sensitivity: always approach lifestyle and reproductive history with respect and without assumptions. A nun would not typically use contraception for religious reasons.", "example": "The patient identified herself as a nun — the pharmacist was respectful and non-judgemental when discussing her medical history, focusing on her presenting symptoms without making assumptions about her lifestyle.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "HAV vs HBV (hepatitis A vs B)", "defn": "HAV (Hepatitis A Virus) = transmitted via faecal-oral route (contaminated food/water) — causes acute illness only, no chronic form, vaccine-preventable. HBV (Hepatitis B Virus) = transmitted via blood and body fluids (unprotected sex, shared needles, mother-to-child) — can become chronic (>6 months), leading to cirrhosis or liver cancer. OET context: key distinction for patient counselling on transmission, prevention, and prognosis.", "example": "Hepatitis A spreads through contaminated food and water — it causes acute illness but does not become chronic. Hepatitis B spreads through blood and body fluids and can develop into a long-term condition if not treated.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "pain described as constant", "defn": "A clinical descriptor for pain that is continuous and unremitting — does not come and go. Contrast with: intermittent pain (comes and goes), colicky pain (waves of severe pain), and breakthrough pain. OET context: when taking a pain history, always clarify character — 'Is the pain there all the time, or does it come and go?' Constant pain often suggests inflammation, tissue damage, or a structural cause.", "example": "The patient described the pain as constant — it had been present continuously for three days and did not ease with rest or paracetamol.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "eczema", "defn": "A chronic inflammatory skin condition causing dry, itchy, red, and cracked skin — also called atopic dermatitis. Pronounced: EK-zuh-muh (3 syllables, stress on EK). Do NOT say 'eg-ZEE-muh' or 'ek-ZEE-muh'. Common triggers: soaps, detergents, allergens, stress, temperature changes. OET context: pharmacists counsel on emollients, steroid creams, and trigger avoidance.", "example": "The patient had a long history of eczema — the pharmacist recommended using an emollient at least twice daily and avoiding soap-based products on the affected areas.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "aqueous cream", "defn": "A water-based emollient (moisturiser) used to soothe and hydrate dry or eczematous skin — historically used as a leave-on moisturiser, but current guidance recommends it as a soap substitute only, as it can worsen the skin barrier if left on. Pronounced: AY-kwee-us KREEM (4 syllables). OET context: pharmacists must counsel patients on correct use — as a wash, not a leave-on moisturiser.", "example": "The pharmacist clarified that aqueous cream should be used as a soap substitute in the shower — not as a leave-on moisturiser, as this can actually make eczema worse.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "crying his eyes out", "defn": "Idiom meaning to cry very intensely and for a prolonged period of time. 'His eyes out' is figurative — not literal. OET context: patients or carers may use this idiom to describe distress in a child or themselves. Recognise the emotion and respond with empathy: 'It sounds like he's been really distressed — that must be very worrying for you.'", "example": "The mother said her baby had been crying his eyes out all night — the pharmacist acknowledged her concern and asked whether the baby had a temperature or any other symptoms.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "rushing to the loo / I need to rush to the loo", "defn": "'Loo' = British colloquial term for toilet/bathroom. 'Rushing to the loo' = urgency to use the toilet — often describes diarrhoea, urinary urgency, or bowel urgency. OET context: patients frequently use 'loo' instead of 'toilet' or 'bathroom' — recognise it and use it back naturally or rephrase clinically ('So you're having to rush to the toilet urgently?').", "example": "The patient said he kept having to rush to the loo — the pharmacist asked how many times a day this was happening and whether there was any blood or mucus in the stool.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "feeling gassy / my stomach feels really gassy", "defn": "Informal patient expression meaning excessive gas or bloating in the abdomen — clinically: flatulence, bloating, or abdominal distension. OET context: recognise colloquial symptom descriptions and rephrase clinically when needed: 'So you're experiencing a lot of bloating or wind?' Common with IBS, lactose intolerance, or certain medications (e.g. metformin).", "example": "The patient said her stomach felt really gassy — the pharmacist asked whether the discomfort was worse after eating and whether she had noticed any change in her bowel habits.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "itchy / itchiness / itch", "defn": "Informal to semi-clinical term for pruritus — an uncomfortable skin sensation causing the urge to scratch. Caused by: eczema, allergic reactions, dry skin, liver disease, renal failure, or drug reactions. OET context: 'itchy' is the patient's term — use it back when counselling, but also know the clinical term 'pruritus' (proo-RY-tus). Always ask: location, severity, what makes it better or worse.", "example": "The patient complained of an itchy rash on both arms — the pharmacist asked how long it had been there, whether anything seemed to trigger it, and whether she had started any new medications recently.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "intrusive", "defn": "Causing disruption or annoyance by intruding into someone's life or space — in a clinical context, used to describe symptoms or thoughts that are unwanted and interfere with daily functioning (e.g. intrusive thoughts in OCD, intrusive questions in history-taking). Pronounced: in-TROO-siv (3 syllables, stress on TROO). OET context: also describes a clinician's approach — avoid being intrusive when asking sensitive personal questions.", "example": "The pharmacist was careful not to appear intrusive when asking about the patient's contraceptive history, framing questions in a sensitive and open manner.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "deficit vs deficiency", "defn": "DEFICIT = a shortage or gap in quantity — used when something is present but in insufficient amounts (e.g. cognitive deficit, attention deficit, fluid deficit). DEFICIENCY = a lack of an essential substance or quality — used for nutrients, vitamins, hormones (e.g. iron deficiency, vitamin D deficiency, immune deficiency). OET tip: deficit → quantity shortfall; deficiency → absence/lack of something essential.", "example": "The patient had an iron deficiency — her haemoglobin levels showed a significant deficit compared to the normal range for her age.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "facial hair (in women) / hirsutism", "defn": "Hirsutism = excessive growth of dark, coarse hair on a woman's face, chest, or back — caused by elevated androgens (male hormones). Clinically significant in Cushing's syndrome, PCOS, and steroid use. Patient term: 'facial hair' or 'hair on my face/chin'. Clinical term: hirsutism — pronounced HUR-soo-tiz-um (4 syllables, stress on HUR). OET context: a sensitive topic — always approach with empathy and without judgement.", "example": "The patient mentioned she had been developing facial hair over the past few months — the pharmacist noted this alongside her other symptoms and recommended an urgent GP review.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "my stomach has become huge / abdominal distension", "defn": "Patient expression for significant abdominal enlargement — clinically: abdominal distension. In the context of Cushing's syndrome, caused by central obesity (fat redistribution to the abdomen). Also seen in ascites, bowel obstruction, or pregnancy. OET: recognise the patient's language and rephrase clinically — 'So you've noticed your abdomen has become significantly larger?'", "example": "The patient said her stomach had become huge over the past year — the pharmacist asked whether the weight gain seemed to be mainly around her middle and whether she had noticed any other changes.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "weight concentrated around the middle / central obesity", "defn": "Central obesity = excess fat distribution around the abdomen and trunk rather than the limbs — a hallmark feature of Cushing's syndrome and metabolic syndrome. Patient expressions: 'weight around my middle', 'belly fat', 'I've put on a lot around my tummy'. Clinical term: truncal obesity or central adiposity. OET: key symptom to elicit when suspecting Cushing's or steroid side effects.", "example": "She said she had put on a lot of weight and it seemed to be concentrated around her middle — the pharmacist noted this was consistent with the side effect profile of long-term corticosteroid use.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "hump (buffalo hump / dorsocervical fat pad)", "defn": "A characteristic fat deposit at the back of the neck and upper back — clinically called a dorsocervical fat pad or buffalo hump. A classic feature of Cushing's syndrome (due to cortisol excess) or long-term corticosteroid use. Patient term: 'a hump on my back' or 'a lump at the back of my neck'. OET: recognise as a red flag symptom requiring urgent GP referral.", "example": "The patient pointed to a noticeable hump at the back of her neck — the pharmacist recognised this as a potential sign of Cushing's syndrome and recommended an urgent GP review.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "excessively", "defn": "To a degree that is more than necessary, normal, or desirable — used as an intensifier in clinical descriptions (e.g. sweating excessively, bleeding excessively, eating excessively). Pronounced: ek-SES-iv-lee (4 syllables, stress on SES). OET context: use 'excessively' to convey severity without being alarmist — 'Are you sweating excessively, even when you're not warm?'", "example": "The patient reported that she had been sweating excessively, even in cool environments — the pharmacist noted this alongside her other symptoms for GP follow-up.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "it takes ages to heal / poor wound healing", "defn": "'Takes ages to heal' = informal expression for delayed wound healing — clinically: impaired wound healing. A significant feature of Cushing's syndrome and long-term corticosteroid use (cortisol impairs collagen synthesis and immune response). OET context: elicit this symptom by asking 'Do you find that cuts or scratches take much longer than usual to heal?'", "example": "The patient mentioned that even small cuts seemed to take ages to heal — the pharmacist asked how long this had been happening and whether she was on any long-term steroid medication.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "if I get a cut or scratch / skin fragility", "defn": "Patient expression describing increased skin fragility — skin that bruises, cuts, or tears easily. Clinically: skin atrophy and fragility from cortisol excess or long-term corticosteroid use. Cortisol breaks down collagen, making the skin thinner and more vulnerable. OET: ask 'Do you find your skin bruises or tears more easily than it used to?'", "example": "She said that if she got even a small cut or scratch it would bleed for a long time and leave a mark — the pharmacist recognised this as a sign of skin fragility associated with long-term steroid use.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "stretch marks / striae", "defn": "Stretch marks = lines or streaks on the skin caused by rapid stretching of the skin — clinically called striae (STRY-ee). In Cushing's syndrome, striae are typically wide, purple or red, and found on the abdomen, thighs, and arms — caused by cortisol-induced skin thinning and rapid weight gain. Distinguish from normal stretch marks (white/silver, from pregnancy or puberty). Pronounced: STRY-ee (2 syllables).", "example": "The patient showed the pharmacist red stretch marks on her abdomen and upper arms — the pharmacist noted these were wider and more deeply coloured than typical and recommended urgent GP assessment.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "skin looks red and puffy / plethoric face / moon face", "defn": "Moon face = a rounded, full face caused by fat redistribution from cortisol excess — a classic sign of Cushing's syndrome. Plethoric face = a flushed, red, puffy appearance. Patient expressions: 'my face looks puffy', 'my skin looks red', 'I look like I've put on weight in my face'. OET: recognise these descriptions as potential Cushing's features and refer urgently.", "example": "The patient said she used to have quite pale skin but now it looked red and puffy — the pharmacist recognised this as a plethoric appearance consistent with possible Cushing's syndrome.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "acne (in adults) / steroid acne", "defn": "Acne = a skin condition causing spots, pimples, and cysts — normally associated with puberty, but adult acne can be caused by hormonal imbalances (e.g. PCOS, Cushing's) or long-term corticosteroid use (steroid acne). Pronounced: AK-nee (2 syllables, stress on AK). Steroid acne typically appears on the trunk (chest/back) as well as the face. OET: ask about new or worsening acne in patients on long-term steroids.", "example": "The patient reported that her acne had worsened significantly since starting the steroid medication — the pharmacist noted this alongside her other symptoms and arranged a GP review.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "apart from the high blood pressure", "defn": "A patient's conversational way of introducing additional medical history — 'apart from X' = 'in addition to X' or 'besides X'. Used when listing comorbidities or current conditions. OET context: listen carefully after 'apart from' — the patient is about to disclose more significant medical history. Rephrase clinically: 'So in addition to your hypertension, are there any other medical conditions I should be aware of?'", "example": "The patient said, 'Apart from the high blood pressure, I also take a tablet for my cholesterol' — the pharmacist noted both conditions and checked for potential drug interactions.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "blood-thinning medication / anticoagulant / antiplatelet", "defn": "Patient term for anticoagulant or antiplatelet medications — drugs that reduce the blood's ability to clot. 'Blood thinners' is the common patient expression. Examples: warfarin, apixaban, rivaroxaban (anticoagulants); aspirin, clopidogrel (antiplatelets). OET critical point: always ask about blood-thinning medication before any procedure, surgery, or dental work — increased bleeding risk. Rephrase clinically: 'Are you taking any medication to prevent blood clots or thin your blood?'", "example": "The patient mentioned she was on blood-thinning medication — the pharmacist asked which one, confirmed the dose, and noted the increased bleeding risk before the planned procedure.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "stents (coronary stent / vascular stent)", "defn": "A stent = a small mesh tube inserted into a narrowed or blocked artery to keep it open — used after a heart attack (coronary stent) or in peripheral vascular disease. Pronounced: STENT (1 syllable). Patients on coronary stents are typically on dual antiplatelet therapy (aspirin + clopidogrel) and must NOT stop these without medical advice — stopping increases risk of stent thrombosis. OET: always ask 'Have you had any stents fitted?' in cardiac history-taking.", "example": "The patient mentioned he had had two stents fitted after his heart attack three years ago — the pharmacist confirmed he was still taking both aspirin and clopidogrel and advised him never to stop these without speaking to his cardiologist first.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "I sprained this one badly last year", "defn": "A sprain = an injury to a ligament (tissue connecting bones) caused by overstretching or tearing — most commonly the ankle. 'I sprained it badly' = a severe sprain, possibly grade 2 or 3. Patient expression: 'I sprained my ankle/wrist/knee'. Pronounced: SPRAYND (1 syllable). OET context: distinguish from a strain (muscle/tendon injury) and a fracture. Ask: 'Did you have it X-rayed? Is it still giving you trouble?'", "example": "The patient said she had sprained her ankle badly the previous year — the pharmacist asked whether it had fully recovered and whether she had any ongoing pain or instability.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "central incisors", "defn": "The two front teeth in the centre of the upper or lower jaw — the first teeth visible when smiling. Clinically: central incisors (upper = maxillary central incisors; lower = mandibular central incisors). Pronounced: in-SY-zorz (3 syllables, stress on SY). OET dental/medical context: relevant when documenting tooth injuries, dental history, or assessing facial trauma. Patient may say 'my two front teeth'.", "example": "The patient reported that she had knocked out one of her central incisors in an accident five years ago — the pharmacist noted this in her dental history.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "varicose veins", "defn": "Enlarged, twisted, bulging veins — most commonly in the legs — caused by weakened or damaged valves in the veins. Pronounced: VAR-ih-kohss VAYNZ (4 syllables, stress on VAR and VAYNZ). Symptoms: aching, heaviness, swelling, itching. Risk factors: prolonged standing, pregnancy, obesity, family history. OET context: relevant in surgical pre-assessment, compression stocking counselling, or vascular referral discussions.", "example": "The patient mentioned she had varicose veins in both legs — the pharmacist advised her to elevate her legs when resting and asked whether she had been fitted for compression stockings.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "Um, well, I suppose the main thing is... (hesitation fillers)", "defn": "Conversational hesitation fillers used by patients when they are about to raise their main concern — often after preamble or small talk. 'I suppose', 'um', 'well', 'I mean' signal that the patient is building up to something important. OET listening tip: when you hear these fillers followed by 'the main thing' or 'what I really wanted to ask' — pay close attention, as the patient's primary concern is about to be stated.", "example": "The patient said, 'Um, well, I suppose the main thing is... I'm a bit worried about the anaesthetic' — the pharmacist recognised this as the patient's core concern and gave it full attention.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "after the operation, when I wake up / post-operative", "defn": "Patient expression for the post-operative (post-op) period — the time after surgery when the patient regains consciousness from anaesthesia. 'When I wake up' = recovery from general anaesthesia. Clinical term: post-operative period. OET pre-operative counselling context: patients commonly ask about what to expect when they wake up — pain, nausea, disorientation, tubes, monitoring equipment. Always address these concerns directly and reassuringly.", "example": "The patient asked what would happen after the operation when she woke up — the pharmacist explained that she would be in a recovery room monitored by nurses, and that any pain would be managed promptly.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "will I be in a lot of pain / pain management post-operatively", "defn": "A very common pre-operative patient concern — fear of post-operative pain. OET counselling key: acknowledge the concern empathetically first ('That's a completely understandable worry'), then reassure with information about the pain management plan (multimodal analgesia, patient-controlled analgesia, nursing assessment). Do NOT dismiss the concern or minimise it.", "example": "The patient anxiously asked whether she would be in a lot of pain after the operation — the pharmacist acknowledged her concern, explained that the team would monitor her pain closely, and described the pain relief options that would be available.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}, {"expr": "when I come around / regaining consciousness", "defn": "'Coming around' = informal British expression for regaining consciousness after general anaesthesia or sedation. Clinical equivalent: 'emergence from anaesthesia' or 'regaining consciousness'. OET: recognise this idiom immediately — it is very commonly used by patients and carers. Related expressions: 'come to', 'wake up', 'come round' (British spelling). Rephrase clinically: 'When you regain consciousness after the procedure...'", "example": "The patient asked, 'Will I know what's happening when I come around?' — the pharmacist reassured her that the nursing staff would be right there when she woke up and would explain everything calmly.", "batch": "SET 19 (Latest) — Richard + Greg Multi-Session Batch", "category": "PATIENT-FRIENDLY EXPLANATIONS & RAPPORT"}];

function toggleDark() {
  document.body.classList.toggle('dark');
  localStorage.setItem('oet-vocab-dark', document.body.classList.contains('dark'));
}
if (localStorage.getItem('oet-vocab-dark') === 'true') document.body.classList.add('dark');

// Populate category filter
const cats = [...new Set(DATA.map(r => r.category))].sort();
const sel = document.getElementById('catFilter');
cats.forEach(c => {
  const o = document.createElement('option');
  o.value = c; o.textContent = c;
  sel.appendChild(o);
});

function hl(text, q) {
  if (!q) return text;
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
  return text.replace(re, '<span class="highlight">$1</span>');
}

function render() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const cat = document.getElementById('catFilter').value;

  let filtered = DATA.filter(r => {
    const matchCat = !cat || r.category === cat;
    const matchQ = !q || [r.expr, r.defn, r.example].join(' ').toLowerCase().includes(q);
    return matchCat && matchQ;
  });

  document.getElementById('statLabel').textContent = filtered.length + ' entries';

  if (filtered.length === 0) {
    document.getElementById('mainContent').innerHTML = '<div class="empty">No entries found.</div>';
    return;
  }

  // Group by category
  const groups = {};
  filtered.forEach(r => {
    if (!groups[r.category]) groups[r.category] = [];
    groups[r.category].push(r);
  });

  let html = '';
  Object.keys(groups).sort().forEach(cat => {
    html += `<div class="category-block">
      <div class="category-title">${cat} <span style="font-weight:normal;font-size:11px;color:var(--muted)">(${groups[cat].length})</span></div>
      <table>
        <thead><tr><th style="width:22%">Expression</th><th style="width:40%">Definition + Context</th><th>Example Sentence</th></tr></thead>
        <tbody>`;
    groups[cat].forEach(r => {
      html += `<tr>
        <td class="expr">${hl(r.expr, q)}</td>
        <td>${hl(r.defn, q)}</td>
        <td class="example">${hl(r.example, q)}</td>
      </tr>`;
    });
    html += '</tbody></table></div>';
  });

  document.getElementById('mainContent').innerHTML = html;
}

render();
</script>
</body>
</html>
